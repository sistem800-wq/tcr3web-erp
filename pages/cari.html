  <style>
    /* 616 - Hareket Detayı ürün tablosu: modal genişliğine uyumlu kesin kolon hizası */
    #hareketDetayModal .hareket-urun-table-wrap {
      width: 100%;
      overflow-x: hidden;
      border-radius: 10px;
    }
    #hareketDetayModal .hareket-urun-table {
      width: 100%;
      min-width: 0 !important;
      table-layout: fixed;
    }
    #hareketDetayModal .hareket-urun-table .col-code { width: 13%; }
    #hareketDetayModal .hareket-urun-table .col-name { width: 25%; }
    #hareketDetayModal .hareket-urun-table .col-qty { width: 9%; }
    #hareketDetayModal .hareket-urun-table .col-unit { width: 10%; }
    #hareketDetayModal .hareket-urun-table .col-price { width: 15%; }
    #hareketDetayModal .hareket-urun-table .col-vat { width: 10%; }
    #hareketDetayModal .hareket-urun-table .col-total { width: 18%; }
    #hareketDetayModal .hareket-urun-table th,
    #hareketDetayModal .hareket-urun-table td {
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.25;
      vertical-align: middle;
      box-sizing: border-box;
    }
    #hareketDetayModal .hareket-urun-table th {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #hareketDetayModal .hareket-urun-table td:nth-child(2) {
      white-space: normal;
      overflow-wrap: anywhere;
    }
    #hareketDetayModal .hareket-urun-table td:not(:nth-child(2)),
    #hareketDetayModal .hareket-urun-table tfoot th {
      white-space: nowrap;
    }
    #hareketDetayModal .hareket-urun-table tfoot th {
      padding-top: 7px;
      padding-bottom: 7px;
    }
    #hareketDetayModal .hareket-urun-table .tcr-column-selector-head,
    #hareketDetayModal .hareket-urun-table .tcr-column-selector-cell {
      display: none !important;
    }
    @media (max-width: 720px) {
      #hareketDetayModal .hareket-urun-table-wrap { overflow-x: hidden; }
      #hareketDetayModal .hareket-urun-table { min-width: 0 !important; }
    }

    /* 614 · Hareket Detayı iki sütun / evrak paneli */
    #hareketDetayModal .modal-dialog{max-width:min(1180px,calc(100vw - 32px))}
    #hareketDetayModal .modal-body{padding:0;overflow:hidden}
    .hareket-detail-layout{display:grid;grid-template-columns:300px minmax(0,1fr);height:min(690px,calc(100vh - 180px));min-height:520px}
    .hareket-doc-panel{border-right:1px solid #dbe4ee;background:#f8fafc;padding:16px;display:flex;flex-direction:column;min-height:0}
    .hareket-doc-title{font-size:14px;font-weight:800;color:#111827;margin-bottom:10px}
    .hareket-doc-upload{height:76px;display:flex;align-items:center;justify-content:center;gap:10px;border:1.5px dashed #b8c6d8;border-radius:12px;background:#fff;color:#0f2747;font-size:12px;font-weight:800;cursor:pointer;flex:0 0 auto}
    .hareket-doc-upload svg{width:20px;height:20px;color:#2563eb}
    .hareket-doc-list{display:flex;flex-direction:column;gap:9px;margin-top:12px;overflow:auto;min-height:0;padding-right:3px}
    .hareket-doc-item{display:grid;grid-template-columns:58px minmax(0,1fr) auto;align-items:center;gap:9px;padding:8px;border:1px solid #dbe4ee;border-radius:11px;background:#fff;min-width:0}
    .hareket-doc-thumb{width:58px;height:48px;border-radius:8px;overflow:hidden;background:#eef2f7;display:grid;place-items:center;color:#dc2626;font-weight:900;font-size:11px}
    .hareket-doc-thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .hareket-doc-meta{min-width:0}
    .hareket-doc-name{font-size:11px;font-weight:800;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hareket-doc-sub{font-size:10px;color:#334155;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .hareket-doc-actions{display:flex;gap:5px}
    .hareket-doc-actions .icon-btn{width:32px;height:32px;min-width:32px}
    .hareket-detail-main{overflow:auto;padding:16px;min-width:0}
    .hareket-detail-main .grid-2{gap:12px}
    .hareket-detail-main .card{border-radius:12px}
    /* 613 · Üst bilgi kartları kompakt */
    #hareketDetayModal .hareket-detail-main > .grid-2.mb-4{margin-bottom:10px !important}
    #hareketDetayModal .hareket-detail-main > .grid-2.mb-4 .card-body{padding:10px 12px !important}
    #hareketDetayModal .hareket-detail-main > .grid-2.mb-4 .text-soft{margin-bottom:4px !important;font-size:11px !important}
    #hareketDetayModal .hareket-detail-main > .grid-2.mb-4 .stat-row{min-height:31px;padding:5px 0}
    #hareketDetayModal .hareket-detail-main > .grid-2.mb-4 .stat-label{font-size:12px}
    #hareketDetayModal .hareket-detail-main > .grid-2.mb-4 .stat-value{font-size:13px}
    #hareketDetayModal #hareketUrunKart .card-body{padding:12px !important}
    #hareketDetayModal #hareketUrunKart .text-soft{margin-bottom:8px !important}
    #hareketPreviewModal .hareket-preview-stage{min-height:420px;display:grid;place-items:center;background:#f1f5f9;border-radius:12px;overflow:auto;padding:12px}
    #hareketPreviewModal .hareket-preview-stage img{max-width:100%;max-height:68vh;object-fit:contain}
    #hareketPreviewModal .hareket-preview-pdf{width:100%;height:58vh;border:0;background:#fff}
    @media(max-width:820px){
      #hareketDetayModal .modal-body{overflow:auto}
      .hareket-detail-layout{grid-template-columns:1fr;height:auto;min-height:0}
      .hareket-doc-panel{border-right:0;border-bottom:1px solid #dbe4ee;max-height:280px}
      .hareket-detail-main{overflow:visible}
    }
  

    /* 598 · Evraklı detay modalları: tablet/mobilde evraklar üstte */
    @media (max-width:1199px){
      #hareketDetayModal .modal-dialog,
      #stokHareketDetayModal .modal-dialog{max-width:min(980px,calc(100vw - 20px))!important}
      #hareketDetayModal .modal-body,
      #stokHareketDetayModal .modal-body{overflow:auto!important}
      #hareketDetayModal .hareket-detail-layout,
      #stokHareketDetayModal .stok-detail-layout{
        display:flex!important;
        flex-direction:column!important;
        height:auto!important;
        max-height:none!important;
        min-height:0!important;
      }
      #hareketDetayModal .hareket-doc-panel,
      #stokHareketDetayModal .stok-detail-docs{
        order:0!important;
        width:100%!important;
        max-height:none!important;
        border-right:0!important;
        border-bottom:1px solid #dbe4ee!important;
        overflow:visible!important;
      }
      #hareketDetayModal .hareket-doc-list{
        display:grid!important;
        grid-template-columns:repeat(2,minmax(0,1fr))!important;
        overflow:visible!important;
      }
      #stokHareketDetayModal .stok-detail-docs{
        display:grid!important;
        grid-template-columns:repeat(2,minmax(0,1fr))!important;
        gap:9px!important;
      }
      #stokHareketDetayModal .stok-detail-docs>.strong{grid-column:1/-1}
      #stokHareketDetayModal .stok-detail-doc-item{margin-top:0!important}
      #hareketDetayModal .hareket-detail-main,
      #stokHareketDetayModal .stok-detail-main{
        order:1!important;
        width:100%!important;
        max-height:none!important;
        overflow:visible!important;
      }
    }
    @media (max-width:640px){
      #hareketDetayModal .hareket-doc-list,
      #stokHareketDetayModal .stok-detail-docs{grid-template-columns:1fr!important}
    }

    /* 598 · Ürün kalemleri sığmadığında iki satırlı kompakt görünüm */
    @media (max-width:1199px){
      #hareketDetayModal .hareket-detail-table-wrap,
      #stokHareketDetayModal .stok-detail-table-wrap{overflow:visible!important}
      #hareketDetayModal .hareket-urun-table,
      #stokHareketDetayModal .stok-detail-line-table{
        display:block!important;
        min-width:0!important;
        width:100%!important;
        table-layout:auto!important;
      }
      #hareketDetayModal .hareket-urun-table colgroup,
      #stokHareketDetayModal .stok-detail-line-table colgroup,
      #hareketDetayModal .hareket-urun-table thead,
      #stokHareketDetayModal .stok-detail-line-table thead{display:none!important}
      #hareketDetayModal .hareket-urun-table tbody,
      #stokHareketDetayModal .stok-detail-line-table tbody{display:block!important}
      #hareketDetayModal .hareket-urun-table tbody tr,
      #stokHareketDetayModal .stok-detail-line-table tbody tr{
        display:grid!important;
        grid-template-columns:minmax(100px,.9fr) minmax(0,2.1fr) repeat(2,minmax(80px,1fr))!important;
        gap:0!important;
        margin:0 0 8px!important;
        border:1px solid #dbe4ee!important;
        border-radius:10px!important;
        overflow:hidden!important;
        background:#fff!important;
      }
      #hareketDetayModal .hareket-urun-table tbody td,
      #stokHareketDetayModal .stok-detail-line-table tbody td{
        width:auto!important;
        min-width:0!important;
        border:0!important;
        padding:8px 10px!important;
        white-space:nowrap!important;
        overflow:hidden!important;
        text-overflow:ellipsis!important;
        text-align:left!important;
        background:#fff!important;
      }
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(1),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(1){
        grid-column:1/2;grid-row:1;font-weight:800;background:#f8fafc!important
      }
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(2),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(2){
        grid-column:2/5;grid-row:1;font-weight:700;white-space:normal!important;background:#f8fafc!important
      }
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(n+3),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(n+3){
        grid-row:2;border-top:1px solid #e5e7eb!important
      }
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(3),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(3){grid-column:1}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(4),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(4){grid-column:2}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(5),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(5){grid-column:3}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(6),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(6){grid-column:4}

      #hareketDetayModal .hareket-urun-table tbody td:nth-child(3)::before{content:'Miktar: ';font-weight:700;color:#475569}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(4)::before{content:'Birim: ';font-weight:700;color:#475569}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(5)::before{content:'İskonto: ';font-weight:700;color:#475569}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(6)::before{content:'Tutar: ';font-weight:700;color:#475569}

      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(3)::before{content:'Miktar: ';font-weight:700;color:#475569}
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(4)::before{content:'Birim: ';font-weight:700;color:#475569}
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(5)::before{content:'Depo: ';font-weight:700;color:#475569}
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(6)::before{content:'İşlem: ';font-weight:700;color:#475569}

      #hareketDetayModal .hareket-urun-table tfoot{display:block!important}
      #hareketDetayModal .hareket-urun-table tfoot tr{display:flex!important;justify-content:flex-end!important;gap:10px;padding:4px 8px}
      #hareketDetayModal .hareket-urun-table tfoot th{display:block!important;width:auto!important;padding:4px!important}
    }
    @media (max-width:620px){
      #hareketDetayModal .hareket-urun-table tbody tr,
      #stokHareketDetayModal .stok-detail-line-table tbody tr{
        grid-template-columns:1fr 1fr!important;
      }
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(1),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(1){grid-column:1;grid-row:1}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(2),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(2){grid-column:2;grid-row:1}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(3),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(3){grid-column:1;grid-row:2}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(4),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(4){grid-column:2;grid-row:2}
      #hareketDetayModal .hareket-urun-table tbody td:nth-child(5),
      #stokHareketDetayModal .stok-detail-line-table tbody td:nth-child(5){grid-column:1;grid-row:3}

    }
</style>

<body>
  <div id="app" class="app"></div>
  <script src="../assets/js/app.js?v=20260717-552"></script>
  <script src="../assets/js/tcr-actions.js?v=20260713-600"></script>
  <script src="../assets/js/master-init.js?v=20260713-583"></script>
  <script src="../assets/js/tcr-table.js?v=20260713-587"></script>
  <script>
    const TURKIYE_ILLERI = ['Adana','Adıyaman','Afyonkarahisar','Ağrı','Aksaray','Amasya','Ankara','Antalya','Ardahan','Artvin','Aydın','Balıkesir','Bartın','Batman','Bayburt','Bilecik','Bingöl','Bitlis','Bolu','Burdur','Bursa','Çanakkale','Çankırı','Çorum','Denizli','Diyarbakır','Düzce','Edirne','Elazığ','Erzincan','Erzurum','Eskişehir','Gaziantep','Giresun','Gümüşhane','Hakkâri','Hatay','Iğdır','Isparta','İstanbul','İzmir','Kahramanmaraş','Karabük','Karaman','Kars','Kastamonu','Kayseri','Kırıkkale','Kırklareli','Kırşehir','Kilis','Kocaeli','Konya','Kütahya','Malatya','Manisa','Mardin','Mersin','Muğla','Muş','Nevşehir','Niğde','Ordu','Osmaniye','Rize','Sakarya','Samsun','Siirt','Sinop','Sivas','Şanlıurfa','Şırnak','Tekirdağ','Tokat','Trabzon','Tunceli','Uşak','Van','Yalova','Yozgat','Zonguldak'];
    const ilOptions = (selected='') => '<option value="">İl Seçiniz</option>' + TURKIYE_ILLERI.map(il => `<option value="${il}" ${il===selected?'selected':''}>${il}</option>`).join('');
    bootPage('cari', () => {
      const totalBakiye = MOCK.cari.reduce((s,c) => s + c.bakiye, 0);
      const musteri = MOCK.cari.filter(c => c.tip === 'Müşteri').length;
      const tedarik = MOCK.cari.filter(c => c.tip === 'Tedarikçi').length;
      const riskliCariler = MOCK.cari.filter(c => Number(c.risk || 0) > 0);
      const riskli = riskliCariler.length;
      const borcluCariler = MOCK.cari.filter(c => Number(c.bakiye || 0) > 0);
      const alacakliCariler = MOCK.cari.filter(c => Number(c.bakiye || 0) < 0);
      const borclu = borcluCariler.length;
      const alacakli = alacakliCariler.length;
      const borcluBakiye = borcluCariler.reduce((sum, c) => sum + Number(c.bakiye || 0), 0);
      const alacakliBakiye = Math.abs(alacakliCariler.reduce((sum, c) => sum + Number(c.bakiye || 0), 0));
      const riskliBakiye = Math.abs(riskliCariler.reduce((sum, c) => sum + Number(c.bakiye || 0), 0));

      return `
      <div class="page-head">
        <div>
          <div class="breadcrumb">
            <a href="dashboard.html">Genel</a><span>›</span>
            <a href="cari.html">Ticaret</a><span>›</span>
            <span>Cari Kartlar</span>
          </div>
          <h1 class="page-title">Cari Kartlar</h1>
          <div class="page-sub">Müşteri ve tedarikçi hesapları, bakiye ve risk takibi</div>
        </div>
        <div class="page-actions">
          <button class="btn btn-ghost" onclick="location.href='cari-ekstre.html'">${ICONS.chart} Cari Ekstre</button>
          <button class="btn btn-ghost" onclick="toast('Dışa aktarıldı (prototip)')">${ICONS.download} Dışa Aktar</button>
          <button class="btn btn-primary" onclick="location.href='cari-form.html'">${ICONS.plus} Yeni Cari</button>
        </div>
      </div>

      <div class="tcr-ac-grid">
        <button type="button" class="tcr-action-card tcr-ac-blue" onclick="filterTip('')">
          <span class="tcr-ac-icon">${ICONS.users}</span>
          <span class="tcr-ac-content">
            <span class="tcr-ac-title">Tüm Cariler</span>
            <span class="tcr-ac-desc">Aktif ve pasif tüm kayıtlar</span>
          </span>
          <span class="tcr-ac-badge">${MOCK.cari.length}</span>
        </button>

        <button type="button" class="tcr-action-card tcr-ac-green" onclick="filterTip('Müşteri')">
          <span class="tcr-ac-icon">${ICONS.users}</span>
          <span class="tcr-ac-content">
            <span class="tcr-ac-title">Müşteriler</span>
            <span class="tcr-ac-desc">Sadece müşteri cariler</span>
          </span>
          <span class="tcr-ac-badge">${musteri}</span>
        </button>

        <button type="button" class="tcr-action-card tcr-ac-orange" onclick="filterTip('Tedarikçi')">
          <span class="tcr-ac-icon">${ICONS.box}</span>
          <span class="tcr-ac-content">
            <span class="tcr-ac-title">Tedarikçiler</span>
            <span class="tcr-ac-desc">Sadece tedarikçi cariler</span>
          </span>
          <span class="tcr-ac-badge">${tedarik}</span>
        </button>

        <button type="button" class="tcr-action-card tcr-ac-red" onclick="filterBakiye('borclu')">
          <span class="tcr-ac-icon">${ICONS.trend_down}</span>
          <span class="tcr-ac-content">
            <span class="tcr-ac-title">Borçlu Cariler</span>
            <span class="tcr-ac-desc">${fmtMoney(borcluBakiye)}</span>
          </span>
          <span class="tcr-ac-badge">${borclu}</span>
        </button>

        <button type="button" class="tcr-action-card tcr-ac-orange" onclick="filterBakiye('alacakli')">
          <span class="tcr-ac-icon">${ICONS.trend_up}</span>
          <span class="tcr-ac-content">
            <span class="tcr-ac-title">Alacaklı Cariler</span>
            <span class="tcr-ac-desc">${fmtMoney(alacakliBakiye)}</span>
          </span>
          <span class="tcr-ac-badge">${alacakli}</span>
        </button>

        <button type="button" class="tcr-action-card tcr-ac-purple" onclick="filterRiskliCari()">
          <span class="tcr-ac-icon">${ICONS.alert}</span>
          <span class="tcr-ac-content">
            <span class="tcr-ac-title">Riskli Cariler</span>
            <span class="tcr-ac-desc">${fmtMoney(riskliBakiye)}</span>
          </span>
          <span class="tcr-ac-badge">${riskli}</span>
        </button>
      </div>

    function updateCariFooterTotals() {
      const rows = Array.from(document.querySelectorAll('#cariTable tbody tr'));
      let borc = 0;
      let alacak = 0;

      rows.forEach(row => {
        const cssHidden = row.style.display === 'none';
        const pageHidden = row.hidden;
        if (cssHidden || pageHidden) return;

        const bakiye = Number(row.dataset.bakiye || 0);
        if (bakiye > 0) borc += bakiye;
        else if (bakiye < 0) alacak += Math.abs(bakiye);
      });

      const net = borc - alacak;
      const borcEl = document.getElementById('cariFooterBorc');
      const alacakEl = document.getElementById('cariFooterAlacak');
      const netEl = document.getElementById('cariFooterNet');
      if (borcEl) borcEl.textContent = fmtMoney(borc);
      if (alacakEl) alacakEl.textContent = fmtMoney(alacak);
      if (netEl) {
        netEl.textContent = fmtMoney(Math.abs(net));
        netEl.parentElement.classList.toggle('is-negative', net < 0);
        netEl.parentElement.classList.toggle('is-positive', net > 0);
        netEl.parentElement.setAttribute('data-state', net < 0 ? 'Alacak' : net > 0 ? 'Borç' : 'Denge');
      }
    }

    function scheduleCariFooterTotals() {
      requestAnimationFrame(updateCariFooterTotals);
    }

    function initCariFooterTotals() {
      const table = document.getElementById('cariTable');
      if (!table || table.dataset.cariFooterReady === '1') return;
      table.dataset.cariFooterReady = '1';

      const tbody = table.tBodies[0];
      if (tbody) {
        new MutationObserver(scheduleCariFooterTotals).observe(tbody, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ['hidden', 'style', 'data-bakiye', 'data-tcr-filter-hidden']
        });
      }

      table.addEventListener('click', scheduleCariFooterTotals);
      table.addEventListener('change', scheduleCariFooterTotals);
      scheduleCariFooterTotals();
    }

    document.addEventListener('DOMContentLoaded', () => { initCariFooterTotals(); initCariColumnSelection(); });
    window.addEventListener('load', () => { initCariFooterTotals(); initCariColumnSelection(); });

    function daysAgoDate(days) {
      if (days === null || days === undefined || days === '' || Number.isNaN(Number(days))) return 'Kayıt yok';
      const d = new Date();
      d.setHours(12,0,0,0);
      d.setDate(d.getDate() - Number(days));
      return new Intl.DateTimeFormat('tr-TR', { day:'2-digit', month:'2-digit', year:'numeric' }).format(d);
    }
    function activityDateWithDay(days) {
      if (days === null || days === undefined || days === '' || Number.isNaN(Number(days))) return 'Kayıt yok';
      return `${daysAgoDate(days)} (${Number(days)} Gün)`;
    }
    function cariActivityHint(c) {
      return [
        `Son Satış: ${activityDateWithDay(c.sonSatisGun)}`,
        `Son Tahsilat: ${activityDateWithDay(c.sonTahsilatGun)}`,
        `Son Alım: ${activityDateWithDay(c.sonAlimGun)}`,
        `Son Ödeme: ${activityDateWithDay(c.sonOdemeGun)}`
      ].join('&#10;');
    }
    function isCariVadeGecmis(c) {
      return Number(c.bakiye || 0) > 0 && c.sonSatisGun !== null && c.sonSatisGun !== undefined && Number(c.sonSatisGun) > Number(c.vade || 0);
    }
    function setCariActivityValue(dateId, dayId, days) {
      const dateEl = document.getElementById(dateId);
      const dayEl = document.getElementById(dayId);
      const hasValue = days !== null && days !== undefined && days !== '';
      if (dateEl) dateEl.textContent = hasValue ? daysAgoDate(days) : 'Kayıt yok';
      if (dayEl) dayEl.textContent = hasValue ? `${days} gün önce` : '—';

    function renderHareketUrunler(urunler = []) {
      const body = document.getElementById('hareketUrunlerBody');

      if (!urunler.length) {
        body.innerHTML = '<tr><td colspan="7" class="muted">Bu hareket için ürün kalemi yok.</td></tr>';
        foot.innerHTML = '';
        return;
      }
      let araToplam = 0;
      let kdvToplam = 0;
      body.innerHTML = urunler.map(u => {
        const brut = Number(u.adet) * Number(u.fiyat);
        const iskonto = Number(u.iskonto || 0);
        const ara = Math.max(0, brut - iskonto);
        const kdv = ara * (Number(u.kdv || 0) / 100);
        araToplam += ara;
        kdvToplam += kdv;
        return `<tr>
          <td class="mono strong">${u.kod}</td>
          <td>${u.ad}</td>
          <td class="num">${Number(u.adet).toLocaleString('tr-TR')}</td>
          <td>${u.birim}</td>
          <td class="num">%${u.kdv || 0}</td>
          <td class="num">${fmtMoney(iskonto)}</td>
          <td class="num strong">${fmtMoney(ara + kdv)}</td>
        </tr>`;
      }).join('');
      foot.innerHTML = `
        <tr><th colspan="6" class="num">Ara Toplam</th><th class="num">${fmtMoney(araToplam)}</th></tr>
        <tr><th colspan="6" class="num">KDV Toplam</th><th class="num">${fmtMoney(kdvToplam)}</th></tr>
        <tr><th colspan="6" class="num">Genel Toplam</th><th class="num">${fmtMoney(araToplam + kdvToplam)}</th></tr>

    function normalizeHareketUrunTable() {
      const table = document.querySelector('#hareketDetayModal .hareket-urun-table');
      if (!table) return;
      const firstHead = table.querySelector('thead th:first-child');
      if (firstHead && firstHead.textContent.trim().toLocaleLowerCase('tr-TR') === 'durum') {
        firstHead.remove();
        table.querySelectorAll('tbody tr').forEach(row => {
          const cell = row.querySelector('td:first-child');
          if (cell) cell.remove();
        });
        table.querySelectorAll('tfoot tr').forEach(row => {
          const first = row.querySelector('th:first-child,td:first-child');
          if (first && first.hasAttribute('colspan')) {
            const value = Math.max(1, Number(first.getAttribute('colspan')) - 1);
            first.setAttribute('colspan', String(value));
          }
        });
      }
    }

            <div class="stat-row"><span class="stat-label">Vade Tarihi</span><span class="stat-value">${h.cekDetay.vade}</span></div>
            <div class="stat-row"><span class="stat-label">Tahsilat Tarihi</span><span class="stat-value">${h.cekDetay.tahsilatTarihi}</span></div>
            <div class="stat-row"><span class="stat-label">Durum</span><span class="stat-value"><span class="badge badge-success">${h.cekDetay.durum}</span></span></div>
          `;
        } else {
          ekKart.style.display = 'none';
          ekIcerik.innerHTML = '';
        }
      }
      const urunKart = document.getElementById('hareketUrunKart');
      const isUrunluHareket = Array.isArray(h.urunler) && h.urunler.length > 0 && ['Satış Faturası','Alış Faturası','Sipariş'].includes(h.tur);
      if (urunKart) urunKart.style.display = isUrunluHareket ? '' : 'none';
      renderHareketUrunler(isUrunluHareket ? h.urunler : []);
      openModal('hareketDetayModal');
    }
  </script>
</body>
</html>
