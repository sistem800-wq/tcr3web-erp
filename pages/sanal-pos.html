              <div class="form-field"><label class="form-label">SmsNo</label><input class="form-input" id="pos-smsno" value="0532 111 22 33" /></div>

              <div class="form-field"><label class="form-label">Kart No</label><input class="form-input mono pos-card-number-input" value="" inputmode="numeric" maxlength="19" autocomplete="cc-number" placeholder="•••• •••• •••• ••••" /></div>

      ${modalHtml('posCekimModal','Yeni POS Çekimi',`<div class="form-grid-3"><div class="form-field"><label class="form-label">İşlem No</label><input class="form-input mono" value="POS202607061000004" readonly /></div><div class="form-field"><label class="form-label">POS Sağlayıcı</label><select class="form-input" id="pos-modal-provider" onchange="changePosProvider(this.value)">${providerOptions()}</select></div><div class="form-field"><label class="form-label">Cari</label><div class="input-action"><input class="form-input cursor-pointer" id="pos-modal-cari" value="ABC İnşaat Ltd. Şti." readonly onclick="openPosCariPicker('modal')" /><input type="hidden" id="pos-modal-cari-id" value="CR001" /><button class="btn btn-ghost btn-sm" onclick="openPosCariPicker('modal')">Seç</button></div></div><div class="form-field"><label class="form-label">SmsNo</label><input class="form-input" id="pos-modal-smsno" value="0532 111 22 33" /></div><div class="form-field"><label class="form-label">Kart Üzerindeki İsim</label><input class="form-input" placeholder="AD SOYAD" /></div><div class="form-field"><label class="form-label">Kart No</label><input class="form-input mono pos-card-number-input" value="" inputmode="numeric" maxlength="19" autocomplete="cc-number" placeholder="•••• •••• •••• ••••" /></div><div class="form-field"><label class="form-label">Son Kullanma</label><input class="form-input mono pos-expiry-input" value="" inputmode="numeric" maxlength="5" autocomplete="cc-exp" placeholder="12/31" /></div><div class="form-field"><label class="form-label">CVV</label><input class="form-input" placeholder="***" /></div><div class="form-field"><label class="form-label">Taksit</label><select class="form-input"><option>Tek Çekim</option><option>3 Taksit</option><option>6 Taksit</option><option>9 Taksit</option></select></div><div class="form-field"><label class="form-label">Tutar</label><input class="form-input text-right strong" value="48.500,00" /></div><div class="form-field full"><label class="form-label">Açıklama</label><textarea class="form-input" rows="2">Moka Sanal POS cari tahsilatı</textarea></div><label class="checkbox"><input type="checkbox" checked /> 3D Secure kullan</label><label class="checkbox"><input type="checkbox" checked /> Moka ödeme cevabını doğrula</label><label class="checkbox"><input type="checkbox" /> Makbuzu SMS ile gönder</label></div>`,`<div class="modal-balance-left" id="posModalBalance"><b>Mevcut Bakiye:</b> 145.000,00 ₺ <span class="badge badge-success">Alacaklı</span></div><div class="modal-actions-right"><button class="btn btn-danger" onclick="closeModal('posCekimModal')">Vazgeç</button><button class="btn btn-primary" onclick="toast('Moka POS çekimi alındı (prototip)');closeModal('posCekimModal')">Çekim Yap</button></div>`,'modal-lg')}

    function providerOptions(){
      return POS_PROVIDERS.map(p => `<option value="${p.code}" ${p.code===POS_SELECTED_PROVIDER?'selected':''}>${p.name}</option>`).join('');
    }
    function getPosProvider(){
      return POS_PROVIDERS.find(p => p.code === POS_SELECTED_PROVIDER) || POS_PROVIDERS[0];
    }
    function syncPosProviderUi(){
      const p = getPosProvider();
      ['pos-provider','pos-modal-provider','pos-link-provider'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = p.code;
      });
      const badge = document.getElementById('posProviderBadge');
      if (badge) badge.textContent = p.badge;
      const logo = document.getElementById('posCardProvider');
      if (logo) logo.textContent = p.logo;
    }
    function changePosProvider(code){
      POS_SELECTED_PROVIDER = code;
      syncPosProviderUi();
      toast(getPosProvider().name + ' seçildi');
    }
    function openPosCariPicker(scope='main'){
      const displayId = scope === 'modal' ? 'pos-modal-cari' : 'pos-cari';
      const hiddenId  = scope === 'modal' ? 'pos-modal-cari-id' : 'pos-cari-id';
      openPickerFor('cari', displayId, hiddenId, (id, ad) => {
        const rec = MOCK.cari.find(c => (c.kod || String(c.id)) === id) || {};
        POS_SELECTED_CARI = {
          id,
          ad,
          tel: rec.smsNo || rec.telefon || rec.tel || '0532 111 22 33',
          bakiye: Number(rec.bakiye || 0),
          durum: Number(rec.bakiye || 0) < 0 ? 'Borçlu' : Number(rec.bakiye || 0) > 0 ? 'Alacaklı' : 'Sıfır'
        };
        syncPosCariUi(scope);
      });
    }
    function syncPosCariUi(scope){
      const targets = [
        ['pos-cari','pos-cari-id','pos-smsno'],
        ['pos-modal-cari','pos-modal-cari-id','pos-modal-smsno']
      ];
      targets.forEach(([d,h,t]) => {
        const de = document.getElementById(d), he = document.getElementById(h), te = document.getElementById(t);
        if (de) de.value = POS_SELECTED_CARI.ad;
        if (he) he.value = POS_SELECTED_CARI.id;
        if (te) te.value = POS_SELECTED_CARI.tel;
      });
      const bal = document.getElementById('posModalBalance');
      if (bal) {
        const cls = POS_SELECTED_CARI.durum === 'Borçlu' ? 'badge-danger' : POS_SELECTED_CARI.durum === 'Alacaklı' ? 'badge-success' : 'badge-neutral';
        bal.innerHTML = `<b>Mevcut Bakiye:</b> ${fmtMoney(Math.abs(POS_SELECTED_CARI.bakiye))} <span class="badge ${cls}">${POS_SELECTED_CARI.durum}</span>`;
      }
      if (scope) toast(POS_SELECTED_CARI.ad + ' seçildi');
    }
    setTimeout(() => { syncPosProviderUi(); syncPosCariUi(); }, 0);


    function formatCardNumber(value){
      return String(value || '')
        .replace(/\D/g, '')
        .slice(0, 16)
        .replace(/(.{4})/g, '$1 ')
        .trim();
    }
    function maskCardNumber(value){
      const digits = String(value || '').replace(/\D/g, '').slice(0, 16);
      if (!digits) return '•••• •••• •••• ••••';
      const first = digits.slice(0, 6).padEnd(6, '•');
      const last = digits.slice(-4).padStart(4, '•');
      return `${first.slice(0,4)} ${first.slice(4,6)}•• •••• ${last}`;
    }
    function formatExpiry(value){
      let digits = String(value || '').replace(/\D/g, '').slice(0, 4);
      if (digits.length >= 2) {
        let month = Math.max(1, Math.min(12, parseInt(digits.slice(0, 2), 10) || 1));
        digits = String(month).padStart(2, '0') + digits.slice(2);
      }
      return digits.length > 2 ? digits.slice(0, 2) + '/' + digits.slice(2) : digits;
    }
    function bindPosCardInputs(){
      document.querySelectorAll('.pos-card-number-input').forEach(input => {
        input.value = input.value ? formatCardNumber(input.value) : '';
        input.addEventListener('input', () => {
          input.value = formatCardNumber(input.value);
          const preview = document.getElementById('posCardPreview');
          if (preview) preview.textContent = maskCardNumber(input.value);
        });
      });
      document.querySelectorAll('.pos-expiry-input').forEach(input => {
        input.value = input.value ? formatExpiry(input.value) : '';
        input.addEventListener('input', () => {
          input.value = formatExpiry(input.value);
          const preview = document.getElementById('posExpiryPreview');
          if (preview) preview.textContent = input.value || '12/31';
        });
      });
      const main = document.querySelector('.pos-card-number-input');
      const preview = document.getElementById('posCardPreview');
      if (main && preview) preview.textContent = maskCardNumber(main.value);
      const expiry = document.querySelector('.pos-expiry-input');
      const expiryPreview = document.getElementById('posExpiryPreview');
      if (expiry && expiryPreview) expiryPreview.textContent = expiry.value || '12/31';
    }
    setTimeout(bindPosCardInputs, 0);

    function selectInstallment(el, rate){document.querySelectorAll('.pos-installment').forEach(x=>x.classList.remove('active'));el.classList.add('active');const amount=48500;const comm=amount*rate/100;document.getElementById('posCommission').textContent=fmtMoney(comm);document.getElementById('posNet').textContent=fmtMoney(amount-comm)}
    function showPosDetail(no){const r=POS_PAYMENTS.find(x=>x.no===no)||POS_PAYMENTS[0];document.getElementById('posDetailBody').innerHTML=`<div class="info-grid"><div><label>İşlem No</label><b>${r.no}</b></div><div><label>Sağlayıcı</label><b>${r.provider}</b></div><div><label>Cari</label><b>${r.cari}</b></div><div><label>Kart</label><b>${r.kart}</b></div><div><label>Tutar</label><b>${fmtMoney(r.tutar)}</b></div><div><label>Net</label><b>${fmtMoney(r.net)}</b></div><div><label>Durum</label><b>${r.durum}</b></div><div><label>Taksit</label><b>${r.taksit}</b></div><div><label>Tarih</label><b>${r.tarih}</b></div></div>`;openModal('posDetailModal')}
    function filterPosRows(q){q=(q||'').toLowerCase();document.querySelectorAll('#posTable tbody tr').forEach(tr=>{tr.style.display=tr.innerText.toLowerCase().includes(q)?'':'none'})}
  </script>
</body>
</html>
