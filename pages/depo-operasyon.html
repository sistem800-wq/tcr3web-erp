<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10243f"><link rel="manifest" href="../manifest.webmanifest?v=20260711-699"><link rel="icon" href="../assets/icons/favicon-64.png"><title>Tcr3WEB · Depo Operasyonları</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/style.css?v=20260712-653"><link rel="stylesheet" href="../assets/css/responsive-master.css?v=20260713-591"><link rel="stylesheet" href="../assets/css/performance.css?v=20260711-700"><link rel="stylesheet" href="../assets/css/depo-operasyon.css?v=728"><link rel="stylesheet" href="../assets/css/tcr-table.css?v=20260713-583">  <link rel="stylesheet" href="../assets/css/kpi-standard.css?v=20260712-694" />

</head><body><div id="app" class="app"></div><script src="../assets/js/app.js?v=20260716-574"></script><script src="../assets/js/tcr-actions.js?v=20260713-600"></script>
  <script src="../assets/js/master-init.js?v=20260713-583"></script>
  <script src="../assets/js/tcr-table.js?v=20260713-587"></script><script src="../assets/js/depo-operasyon.js?v=728"></script><script>
bootPage('depo-operasyon',()=>{const wh=DOP.warehouse, orders=DOP.orders.filter(o=>o.warehouse===wh),ready=orders.filter(o=>o.status==='Hazır').length,missing=orders.filter(o=>o.status==='Eksik').length,waiting=orders.filter(o=>o.status==='Bekliyor').length,preparing=orders.filter(o=>o.status==='Hazırlanıyor'||o.status==='Kısmi Hazır').length;
const k=(label,val,icon,accent,soft,badge)=>`<div class="tcr-action-card" style="--tcr-ac-color:${accent};--tcr-ac-soft:${soft}"><span class="tcr-ac-icon">${ICONS[icon]}</span><span class="tcr-ac-content"><span class="tcr-ac-title">${label}</span><span class="tcr-ac-desc">${val}</span></span></div>`;
const tasks=orders.slice(0,4).map(o=>{const pr=dopOrderProgress(o);return `<div class="dop-task"><div class="dop-order">${o.id.replace('AS-2026-','AS<br>')}</div><div><div class="dop-task-title">${o.customer}</div><div class="dop-task-meta"><span class="dop-chip ${dopStatusClass(o.status)}">${o.status}</span><span class="dop-chip">${o.items.length} kalem</span><span class="dop-chip">Termin ${o.deadline}</span></div><div class="dop-progress"><span style="width:${pr.pct}%"></span></div></div><div class="dop-actions"><button class="dop-icon-btn indigo" title="Siparişi görüntüle" onclick="location.href='depo-hazirlik.html?id=${o.id}'">${ICONS.eye}</button><button class="dop-icon-btn green" title="Hazırlamaya başla" onclick="dopStart('${o.id}')">${ICONS.play||ICONS.check}</button></div></div>`}).join('')||'<div class="dop-empty">Bu depoya atanmış aktif sipariş yok.</div>';
return `<div class="page-head"><div><div class="breadcrumb"><span>Depo Operasyonları</span><span>›</span><span>Dashboard</span></div><h1 class="page-title">${ICONS.truck} Depo Operasyonları</h1><div class="page-sub">Depo personeli için hazırlık, teslimat ve mal kabul çalışma alanı</div></div><div class="dop-warehouse-select"><label class="dop-lock-note">${ICONS.building} Yetkili depo</label><select onchange="dopSetWarehouse(this.value)"><option ${wh==='Merkez Depo'?'selected':''}>Merkez Depo</option><option ${wh==='Araç Deposu'?'selected':''}>Araç Deposu</option><option ${wh==='Kimya Depo'?'selected':''}>Kimya Depo</option></select></div></div><div class="tcr-ac-grid">${k('Hazırlanacak',orders.length,'inbox','#4f46e5','#eef2ff','aktif')}${k('Hazırlanıyor',preparing,'clock','#0891b2','#ecfeff','işlemde')}${k('Hazır',ready,'check','#16a34a','#f0fdf4','tam')}${k('Eksik Ürün',missing,'alert','#dc2626','#fef2f2','kritik')}${k('Mal Kabul',DOP.receipts.filter(r=>r.status!=='Tamamlandı').length,'file_check','#d97706','#fffbeb','bekliyor')}${k('Bugün Teslim',ready,'send','#0284c7','#f0f9ff','plan') }</div><div class="dop-layout"><section class="dop-panel" style="--accent:#4f46e5"><div class="dop-panel-head"><div><div class="dop-panel-title">Öncelikli Hazırlık Listesi</div><div class="dop-panel-sub">Fiyat, iskonto, cari bakiye ve sipariş toplamları depo rolünde gizlidir.</div></div><a class="btn btn-primary btn-sm" href="depo-hazirlik.html">Tümünü Gör</a></div><div class="dop-panel-body">${tasks}</div></section><aside class="dop-panel" style="--accent:#0891b2"><div class="dop-panel-head"><div><div class="dop-panel-title">Hızlı İşlemler</div><div class="dop-panel-sub">Mobil kullanım için tek dokunuşlu işlemler</div></div></div><div class="dop-panel-body"><div class="dop-quick"><a href="depo-hazirlik.html">${ICONS.inbox}<b>Hazırlık</b><small>Sipariş kalemleri</small></a><a href="depo-teslimat.html">${ICONS.send}<b>Teslimat</b><small>Hazır siparişler</small></a><a href="depo-mal-kabul.html">${ICONS.file_check}<b>Mal Kabul</b><small>Gelen ürünler</small></a><a href="depo-eksik.html">${ICONS.alert}<b>Eksikler</b><small>Talep oluştur</small></a></div><button class="btn btn-ghost btn-sm" style="width:100%;margin-top:12px" onclick="dopReset()">Demo Verisini Sıfırla</button></div></aside></div>`})
</script></body></html>
