<!DOCTYPE html>

<body class="tcr-cari-master">
  <div id="app" class="app"></div>
  <script src="../assets/js/app.js?v=20260716-574"></script>
  <script src="../assets/js/tcr-actions.js?v=20260713-600"></script>
  <script src="../assets/js/master-init.js?v=20260713-583"></script>
  <script src="../assets/js/tcr-table.js?v=20260713-587"></script>
  <script>





    const CARI_FIS_TIPLERI = [
      { id: 'acilis', label: 'Açılış Fişi', iconKey: 'inbox',      color: 'var(--c-accent-500)',  desc: 'İlk açılış cari bakiyesi' },
      { id: 'devir',  label: 'Devir Fişi',   iconKey: 'trend-up',  color: 'var(--c-primary-500)', desc: 'Dönem başı cari devir işlemleri' },
      { id: 'virman', label: 'Virman Fişi',  iconKey: 'send',      color: 'var(--c-danger-400)',  desc: 'Cariler arası bakiye aktarımı' },
    ];

    const MOCK_CARI_FIS = [
      { no: 'AFIS2026070610000001', tip: 'acilis', tarih: '2026-01-01', kalem: 12, cari: '12 cari hesap', borc: 320000, alacak: 320000, durum: 'Onaylandı', aciklama: 'Açılış cari bakiyeleri' },
      { no: 'AFIS2026070610000002', tip: 'acilis', tarih: '2026-01-01', kalem: 8, cari: '8 cari hesap', borc: 186500, alacak: 186500, durum: 'Onaylandı', aciklama: 'Tedarikçi açılış fişi' },
      { no: 'DFIS2026070610000001', tip: 'devir',  tarih: '2026-01-01', kalem: 16, cari: '16 cari hesap', borc: 438750, alacak: 438750, durum: 'Onaylandı', aciklama: 'Önceki dönem devri' },
      { no: 'DFIS2026070610000002', tip: 'devir',  tarih: '2026-01-01', kalem: 6, cari: '6 cari hesap', borc: 92400, alacak: 92400, durum: 'Bekliyor',  aciklama: 'Yıl sonu devir kaydı' },
      { no: 'VFIS2026070610000001', tip: 'virman', tarih: '2026-07-05', kalem: 2, cari: 'Marmara Tekstil → Akdeniz Gıda', borc: 15000, alacak: 15000, durum: 'Taslak', aciklama: 'Cari hesaplar arası virman' },
      { no: 'VFIS2026070610000002', tip: 'virman', tarih: '2026-07-05', kalem: 2, cari: 'Yıldız Plastik → Karadeniz Mobilya', borc: 9200, alacak: 9200, durum: 'Onaylandı', aciklama: 'Bakiye aktarımı' },
    ];

    const CF_SVG_EYE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const CF_SVG_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg>`;
    const CF_SVG_LOCK_OPEN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>`;
    const CF_SVG_LOCK_KEYHOLE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="16" r="1"/><rect width="18" height="12" x="3" y="10" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg>`;
    const CF_SVG_LOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
    function cfLockState(index){
      if(index < 2) return {key:'open', cls:'is-open', label:'İşlem yapılabilir', svg:CF_SVG_LOCK_OPEN, detail:'Kilit süresi devam ediyor'};
      if(index === 2) return {key:'last-day', cls:'is-last-day', label:'Son gün', svg:CF_SVG_LOCK_KEYHOLE, detail:'Bugün son işlem günü'};
      return {key:'locked', cls:'is-locked', label:'Kilitli', svg:CF_SVG_LOCK, detail:'İşlem süresi doldu'};
    }
    function cfStatusBadge(status) { const cls=status==='Onaylandı'?'status active':status==='Bekliyor'?'status warning':'status'; return `<span class="${cls}">${status}</span>`; }
    function cfTipLabel(tip) { return CARI_FIS_TIPLERI.find(x=>x.id===tip)?.label || tip; }
    function showCariFisLockInfo(no,locked) { toast(locked?`${no} kaydı kilitli`:`${no} kaydı düzenlenebilir`,locked?'warning':'success'); }
    function cfRow(row,index) { const lockState=cfLockState(index); const locked=lockState.key==='locked'; return `<tr data-tip="${row.tip}" data-no="${row.no}" data-lock-state="${lockState.key}"><td data-label="Fiş No" class="mono"><strong>${row.no}</strong></td><td data-label="Tip">${cfTipLabel(row.tip)}</td><td data-label="Tarih">${fmtDate(row.tarih)}</td><td data-label="Cari / İçerik"><strong>${row.cari}</strong></td><td data-label="Kalem" class="num">${row.kalem}</td><td data-label="Borç" class="num" style="color:#dc2626;font-weight:900">${fmtMoney(row.borc)}</td><td data-label="Alacak" class="num" style="color:#059669;font-weight:900">${fmtMoney(row.alacak)}</td><td data-label="Durum">${cfStatusBadge(row.durum)}</td><td data-label="Açıklama">${row.aciklama||'-'}</td><td data-label="İşlem"><div class="tcr-row-actions"><button type="button" class="icon-btn" title="Gör" onclick="toast('${row.no} görüntülendi')">${CF_SVG_EYE}</button><button type="button" class="icon-btn success" title="Düzenle" onclick="location.href='cari-fis-form.html?no=${encodeURIComponent(row.no)}'">${CF_SVG_EDIT}</button></div></td></tr>`; }

    bootPage('cari-fisleri', () => {
      const fisRows=MOCK_CARI_FIS.map(cfRow).join('');
      return `<div class="page-head"><div><div class="breadcrumb"><a href="dashboard.html">Genel</a><span>›</span><a href="cari.html">Cari</a><span>›</span><span>Cari Fişleri</span></div><h1 class="page-title">${ICONS['file-text']} Cari Fişleri</h1><div class="page-sub">Açılış, devir ve virman fiş kayıtları</div></div><div class="page-actions"><button class="btn btn-ghost" onclick="toast('Cari fiş raporu indirildi (prototip)')">${ICONS.download} Rapor</button><button class="btn btn-primary" onclick="location.href='cari-fis-form.html?tip=acilis'">${ICONS.plus} Yeni Fiş</button></div></div>
      <div class="tcr-ac-grid">${CARI_FIS_TIPLERI.map(t=>{const c=MOCK_CARI_FIS.filter(f=>f.tip===t.id).length;const cc=t.id==='acilis'?'green':t.id==='devir'?'blue':'red';return `<button type="button" class="tcr-action-card tcr-ac-${cc}" onclick="location.href='cari-fis-form.html?tip=${t.id}'"><span class="tcr-ac-icon">${ICONS[t.iconKey]||ICONS.file}</span><span class="tcr-ac-content"><span class="tcr-ac-title">${t.label}</span><span class="tcr-ac-desc">${t.desc}</span></span><span class="tcr-ac-badge">${c}</span></button>`}).join('')}</div>
      <nav class="cari-mobile-nav" aria-label="Cari fiş hızlı işlemler"><button type="button" class="active" onclick="toggleSidebar()">${ICONS.menu}<span>Menü</span></button><button type="button" onclick="location.href='cari-fis-form.html?tip=acilis'">${ICONS.plus}<span>Yeni Fiş</span></button><button type="button" onclick="filterCariFisTip('acilis');scrollToCariFisTable()">${ICONS.inbox}<span>Açılış</span></button><button type="button" onclick="filterCariFisTip('devir');scrollToCariFisTable()">${ICONS['trend-up']}<span>Devir</span></button><button type="button" onclick="filterCariFisTip('virman');scrollToCariFisTable()">${ICONS.send}<span>Virman</span></button></nav>
      <div class="card cari-list-card"><div class="card-body" style="padding:var(--s-4)"><div class="toolbar tcr-cari-filter-grid"><div class="tcr-filter-field tcr-filter-field--search"><label class="tcr-filter-label">Arama</label><div class="toolbar-search"><span class="toolbar-search-icon">${ICONS.search}</span><input type="text" placeholder="Fiş no, cari veya açıklama ara..." oninput="filterCariFisTable(this.value)" /></div></div><div class="tcr-filter-field"><label class="tcr-filter-label">Tipler</label><select class="filter-select" onchange="filterCariFisTip(this.value)"><option value="">Tüm Tipler</option>${CARI_FIS_TIPLERI.map(t=>`<option value="${t.id}">${t.label}</option>`).join('')}</select></div><div class="tcr-filter-field"><label class="tcr-filter-label">Durumlar</label><select class="filter-select" onchange="filterCariFisDurum(this.value)"><option value="">Tüm Durumlar</option><option>Onaylandı</option><option>Bekliyor</option><option>Taslak</option></select></div></div><div class="table-wrap" style="border:none"><table class="data" id="cariFisTable" data-no-record-lock="true"><thead><tr><th>Fiş No</th><th>Tip</th><th>Tarih</th><th>Cari / İçerik</th><th class="num">Kalem</th><th class="num">Borç</th><th class="num">Alacak</th><th>Durum</th><th>Açıklama</th><th>İşlem</th></tr></thead><tbody>${fisRows}</tbody><tfoot class="cari-bakiye-footer"><tr><td colspan="4" class="cari-bakiye-footer-label">Toplam:</td><td colspan="6"><div class="cari-bakiye-footer-values"><span class="cari-footer-total cari-footer-borc">Borç: <strong id="cfFooterBorc">0,00 ₺</strong></span><span class="cari-footer-total cari-footer-alacak">Alacak: <strong id="cfFooterAlacak">0,00 ₺</strong></span><span class="cari-footer-total cari-footer-net">Net: <strong id="cfFooterNet">0,00 ₺</strong></span></div></td></tr></tfoot></table></div></div></div>`;
    });

    function filterCariFisTable(v) {
      const lv = v.toLowerCase();
      document.querySelectorAll('#cariFisTable tbody tr').forEach(r => {
        r.style.display = r.textContent.toLowerCase().includes(lv) ? '' : 'none';
      });
    }
    function filterCariFisTip(tip) {
      document.querySelectorAll('#cariFisTable tbody tr').forEach(r => {
        r.style.display = (!tip || r.dataset.tip === tip) ? '' : 'none';
      });
    }
    function filterCariFisDurum(durum) {
      document.querySelectorAll('#cariFisTable tbody tr').forEach(r => {
        r.style.display = (!durum || r.textContent.includes(durum)) ? '' : 'none';
      });
    }
  

    function scrollToCariFisTable() {
      setTimeout(function() {
        document.querySelector('.cari-list-card')?.scrollIntoView({behavior:'smooth',block:'start'});
      }, 60);
    }

    function updateCariFisFooterTotals() {
      const rows = Array.from(document.querySelectorAll('#cariFisTable tbody tr'));
      let borc = 0;
      let alacak = 0;

      rows.forEach(row => {
        const cssHidden = row.style.display === 'none';
        const pageHidden = row.hidden;
        if (cssHidden || pageHidden) return;

        const borcText = row.querySelector('td:nth-child(7)')?.textContent || '';
        const alacakText = row.querySelector('td:nth-child(8)')?.textContent || '';
        const borcVal = parseFloat(borcText.replace(/[^0-9,-]/g, '').replace(',', '.')) || 0;
        const alacakVal = parseFloat(alacakText.replace(/[^0-9,-]/g, '').replace(',', '.')) || 0;

        borc += borcVal;
        alacak += alacakVal;
      });

      const net = borc - alacak;
      const borcEl = document.getElementById('cfFooterBorc');
      const alacakEl = document.getElementById('cfFooterAlacak');
      const netEl = document.getElementById('cfFooterNet');
      if (borcEl) borcEl.textContent = fmtMoney(borc);
      if (alacakEl) alacakEl.textContent = fmtMoney(alacak);
      if (netEl) {
        netEl.textContent = fmtMoney(Math.abs(net));
        netEl.parentElement.classList.toggle('is-negative', net < 0);
        netEl.parentElement.classList.toggle('is-positive', net > 0);
        netEl.parentElement.setAttribute('data-state', net < 0 ? 'Alacak' : net > 0 ? 'Borç' : 'Denge');
      }
    }

    function scheduleCariFisFooterTotals() {
      requestAnimationFrame(updateCariFisFooterTotals);
    }

    function initCariFisFooterTotals() {
      const table = document.getElementById('cariFisTable');
      if (!table || table.dataset.cfFooterReady === '1') return;
      table.dataset.cfFooterReady = '1';

      const tbody = table.tBodies[0];
      if (tbody) {
        new MutationObserver(scheduleCariFisFooterTotals).observe(tbody, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ['hidden', 'style', 'data-tcr-filter-hidden']
        });
      }

      table.addEventListener('click', scheduleCariFisFooterTotals);
      table.addEventListener('change', scheduleCariFisFooterTotals);
      scheduleCariFisFooterTotals();
    }

    document.addEventListener('DOMContentLoaded', () => { initCariFisFooterTotals(); });
    window.addEventListener('load', () => { initCariFisFooterTotals(); });

  

    function tcrNormalizeCariActions(tableId) {
      const table = document.getElementById(tableId);
      if (!table) return;

      table.querySelectorAll('tbody tr').forEach((row) => {
        const cell = row.querySelector('td[data-label="İşlem"]') || row.lastElementChild;
        if (!cell) return;

        let group = cell.querySelector('.tcr-row-actions');
        if (!group) {
          group = document.createElement('div');
          group.className = 'tcr-row-actions';
          cell.appendChild(group);
        }

        const allButtons = Array.from(cell.querySelectorAll('button'));
        const isLock = (btn) => {
          const title = (btn.getAttribute('title') || btn.getAttribute('aria-label') || '').toLocaleLowerCase('tr-TR');
          return btn.hasAttribute('data-tcr-lock-action') ||
            btn.classList.contains('tcr-lock-open') ||
            btn.classList.contains('tcr-lock-closed') ||
            title.includes('kilit') || title.includes('düzenlenebilir');
        };

        const lockButtons = allButtons.filter(isLock);
        const canonicalLock = lockButtons.find(btn => btn.hasAttribute('data-tcr-lock-action')) || lockButtons[0];
        lockButtons.forEach(btn => { if (btn !== canonicalLock) btn.remove(); });

        const live = Array.from(cell.querySelectorAll('button'));
        const view = live.find(btn => /gör|gor/i.test(btn.getAttribute('title') || btn.getAttribute('aria-label') || ''));
        const edit = live.find(btn => /düzenle|duzenle/i.test(btn.getAttribute('title') || btn.getAttribute('aria-label') || ''));
        const more = live.find(btn => /diğer|diger|menü|menu/i.test(btn.getAttribute('title') || btn.getAttribute('aria-label') || ''));

        [view, edit, canonicalLock, more].filter(Boolean).forEach(btn => group.appendChild(btn));

        Array.from(cell.children).forEach(child => {
          if (child !== group && child.matches?.('button, .tcr-row-actions')) child.remove();
        });
      });
    }

    function tcrInitCariActionGuard(tableId) {
      const run = () => tcrNormalizeCariActions(tableId);
      run();
      setTimeout(run, 60);
      setTimeout(run, 250);
      const table = document.getElementById(tableId);
      if (!table || table.dataset.actionGuard === '1') return;
      table.dataset.actionGuard = '1';
      let queued = false;
      new MutationObserver(() => {
        if (queued) return;
        queued = true;
        requestAnimationFrame(() => { queued = false; run(); });
      }).observe(table, {subtree:true, childList:true, attributes:true, attributeFilter:['class','title','aria-label']});
    }

  </script>
</body>
</html>
