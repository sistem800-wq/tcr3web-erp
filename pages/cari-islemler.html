  <style>
    .ci-action-pdf{font-size:10px;font-weight:800;letter-spacing:.02em}
    .ci-sms-preview{border:1px solid var(--border);border-radius:12px;background:var(--surface-2);padding:12px;min-height:92px;font-size:13px;color:var(--text-soft)}
    .ci-detail-hero{display:flex;align-items:center;justify-content:space-between;gap:18px;padding:18px 20px;margin-bottom:18px;border:1px solid #cbd5e1;border-left:6px solid #16a34a;border-radius:16px;background:linear-gradient(135deg,#f8fafc 0%,#ffffff 72%);box-shadow:0 8px 22px rgba(15,23,42,.06)}
    .ci-detail-hero-main{display:flex;align-items:center;gap:14px;min-width:0}
    .ci-detail-hero-icon{width:48px;height:48px;display:grid;place-items:center;border-radius:14px;background:#dcfce7;color:#15803d;flex:0 0 auto}
    .ci-detail-hero-icon svg{width:24px;height:24px}
    .ci-detail-hero-title{font-size:18px;font-weight:800;color:#0f172a;line-height:1.25}
    .ci-detail-hero-sub{margin-top:4px;font-size:12px;font-weight:600;color:#475569}
    .ci-detail-amount{text-align:right;flex:0 0 auto}
    .ci-detail-amount-label{display:block;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#64748b;margin-bottom:3px}
    .ci-detail-amount-value{display:block;font-size:24px;line-height:1.1;font-weight:900;color:#16a34a;white-space:nowrap}
    .ci-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0 24px;border:1px solid #dbe3ee;border-radius:16px;background:#fff;padding:4px 18px;margin-bottom:16px}
    .ci-detail-item{display:grid;grid-template-columns:minmax(120px,42%) minmax(0,1fr);align-items:center;gap:14px;min-height:58px;border-bottom:1px solid #e5e7eb;padding:10px 2px}
    .ci-detail-item:nth-last-child(-n+2){border-bottom:0}
    .ci-detail-label{font-size:11px;color:#475569;font-weight:800;text-transform:uppercase;letter-spacing:.035em}
    .ci-detail-value{font-size:14px;color:#111827;font-weight:700;text-align:right;overflow-wrap:anywhere}
    .ci-detail-value.mono{font-family:'JetBrains Mono',monospace;font-size:13px}
    .ci-detail-status{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 10px;background:#dcfce7;color:#166534;font-size:12px;font-weight:800}
    .ci-detail-status::before{content:'';width:7px;height:7px;border-radius:50%;background:#16a34a}
    .ci-detail-note{display:flex;gap:12px;align-items:flex-start;border:1px solid #dbe3ee;border-radius:14px;background:#f8fafc;padding:14px 16px;color:#111827;font-size:13px;line-height:1.55}
    .ci-detail-note-icon{width:32px;height:32px;display:grid;place-items:center;border-radius:10px;background:#e0f2fe;color:#0369a1;flex:0 0 auto}
    .ci-detail-note-icon svg{width:17px;height:17px}
    .ci-detail-note-title{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:#475569;margin-bottom:2px}
    #cariIslemDetailModal .modal-content{max-width:900px}
    #cariIslemDetailModal .modal-footer{gap:12px;align-items:center}
    #cariIslemDetailModal .modal-foot-left{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
    #cariIslemDetailModal .modal-foot-left .btn{min-height:40px}
    #cariIslemDetailModal .ci-doc-chip{margin-right:4px}
    @media (max-width:768px){.ci-detail-hero{align-items:flex-start;flex-direction:column}.ci-detail-amount{text-align:left}.ci-detail-grid{grid-template-columns:1fr;padding:4px 14px}.ci-detail-item:nth-last-child(-n+2){border-bottom:1px solid #e5e7eb}.ci-detail-item:last-child{border-bottom:0}.ci-detail-item{grid-template-columns:1fr;gap:4px}.ci-detail-value{text-align:left}.data .flex.gap-2{gap:4px}.data .icon-btn{width:28px!important;height:28px!important}}
    .ci-actions{position:relative;display:inline-flex;gap:6px;justify-content:flex-end;align-items:center;overflow:visible}
    .ci-table-wrap{overflow:visible!important}
    .ci-output-menu{position:fixed!important;z-index:2147483647!important;width:210px;border:1px solid var(--border);border-radius:14px;background:#fff!important;box-shadow:0 28px 70px rgba(15,23,42,.28);padding:7px;display:none;text-align:left;isolation:isolate;transform:translateZ(0);overflow:hidden;pointer-events:auto}
    .ci-output-menu.open{display:block!important}
    .ci-output-title{font-size:10px;font-weight:900;color:var(--text-mute);text-transform:uppercase;letter-spacing:.08em;padding:7px 9px 6px;border-bottom:1px solid var(--border);margin-bottom:5px;white-space:nowrap;background:#fff!important}
    .ci-output-item{width:100%;display:flex;align-items:center;gap:10px;border:0;background:transparent;color:var(--text);border-radius:10px;padding:8px 9px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;line-height:1.2;text-align:left;position:relative;z-index:1}
    .ci-output-item:hover{background:var(--c-nu-50);color:var(--c-primary-700)}
    .ci-output-item svg{width:16px;height:16px;flex:0 0 auto;color:var(--text-soft)}
    .ci-output-sep{height:1px;background:var(--border);margin:5px 4px}
    .ci-output-trigger{position:relative;z-index:3}
    .ci-doc-chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800;color:var(--text-soft);background:var(--surface-2)}
    .tcr-print-only{display:none}
    @media (max-width: 768px){.ci-output-menu{width:214px}.data .flex.gap-2{gap:4px}.data .icon-btn{width:28px!important;height:28px!important}}

  <script>





    const CARI_ISLEM_TIPLERI = [
      { id: 'tahsilat',       label: 'Tahsilat',       actionLabel: 'Yeni Tahsilat',       group: 'Finansal İşlemler', iconKey: 'cash',       color: 'var(--c-accent-500)',  desc: 'Müşteriden alınan ödeme kaydı' },
      { id: 'odeme',          label: 'Ödeme',          actionLabel: 'Yeni Ödeme',          group: 'Finansal İşlemler', iconKey: 'wallet',     color: 'var(--c-danger-400)',  desc: 'Tedarikçiye yapılan ödeme kaydı' },
      { id: 'alinan_cek',     label: 'Alınan Çek',     actionLabel: 'Alınan Çek',          group: 'Evrak İşlemleri',    iconKey: 'file_check', color: 'var(--c-primary-500)', desc: 'Müşteri çeki portföye alma' },
      { id: 'verilen_cek',    label: 'Verilen Çek',    actionLabel: 'Verilen Çek',         group: 'Evrak İşlemleri',    iconKey: 'file_check', color: 'var(--c-warn-400)',    desc: 'Kendi çekimiz ile ödeme' },
      { id: 'alinan_senet',   label: 'Alınan Senet',   actionLabel: 'Alınan Senet',        group: 'Evrak İşlemleri',    iconKey: 'file_text',  color: 'var(--c-primary-500)', desc: 'Müşteri senedi portföye alma' },
      { id: 'verilen_senet',  label: 'Verilen Senet',  actionLabel: 'Verilen Senet',       group: 'Evrak İşlemleri',    iconKey: 'file_text',  color: 'var(--c-warn-400)',    desc: 'Kendi senedimiz ile ödeme' },
    ];

    const CARI_ISLEM_KARTLARI = [
      { id: 'tahsilat', actionTip: 'tahsilat', label: 'Yeni Tahsilat', group: 'Finansal İşlemler', iconKey: 'cash', color: 'var(--c-accent-500)', desc: 'Müşteriden alınan ödeme kaydı', match: ['tahsilat'] },
      { id: 'odeme', actionTip: 'odeme', label: 'Yeni Ödeme', group: 'Finansal İşlemler', iconKey: 'wallet', color: 'var(--c-danger-400)', desc: 'Tedarikçiye yapılan ödeme kaydı', match: ['odeme'] },
      { id: 'cek_islemi', actionTip: 'cek_islemi', label: 'Çek İşlemi', group: 'Evrak İşlemleri', iconKey: 'file_check', color: 'var(--c-primary-500)', desc: 'Alınan / verilen çek kaydı', match: ['alinan_cek','verilen_cek'] },
      { id: 'senet_islemi', actionTip: 'senet_islemi', label: 'Senet İşlemi', group: 'Evrak İşlemleri', iconKey: 'file_text', color: 'var(--c-warn-400)', desc: 'Alınan / verilen senet kaydı', match: ['alinan_senet','verilen_senet'] },
    ];

    const MOCK_CARI_ISLEM = [
      { no: 'TAH2026070610000001', tip: 'tahsilat',      tarih: '2026-07-01', cari: 'Marmara Tekstil A.Ş.',       tutar: 25000,  kanal: 'Merkez Kasa',       durum: 'Onaylandı', aciklama: 'Nakit tahsilat' },
      { no: 'ODE2026070610000001', tip: 'odeme',         tarih: '2026-07-01', cari: 'Yıldız Plastik A.Ş.',       tutar: 18000,  kanal: 'Garanti Bankası',   durum: 'Onaylandı', aciklama: 'EFT ödeme' },
      { no: 'ACEK2026070610000001', tip: 'alinan_cek',    tarih: '2026-07-02', cari: 'Anadolu Hırdavat San.',     tutar: 32500,  kanal: 'Portföy',           durum: 'Portföyde', aciklama: 'Müşteri çeki' },
      { no: 'VCEK2026070610000001', tip: 'verilen_cek',   tarih: '2026-07-02', cari: 'Akdeniz Gıda Ltd.',         tutar: 12450,  kanal: 'Garanti / Çek',     durum: 'Bekliyor',  aciklama: 'Verilen çek' },
      { no: 'ASEN2026070610000001', tip: 'alinan_senet',  tarih: '2026-07-03', cari: 'Karadeniz Mobilya A.Ş.',    tutar: 40000,  kanal: 'Portföy',           durum: 'Portföyde', aciklama: 'Müşteri senedi' },
      { no: 'VSEN2026070610000001', tip: 'verilen_senet', tarih: '2026-07-04', cari: 'Marmara Kimya San.',        tutar: 9850,   kanal: 'Firma Senedi',      durum: 'Bekliyor',  aciklama: 'Verilen senet' },
      { no: 'TAH2026070610000002', tip: 'tahsilat',      tarih: '2026-07-04', cari: 'Erciyes Yapı Market',       tutar: 7500,   kanal: 'Ziraat Bankası',    durum: 'Onaylandı', aciklama: 'Havale tahsilat' },
      { no: 'ACEK2026070610000002', tip: 'alinan_cek',    tarih: '2026-07-05', cari: 'Ege Lojistik Ltd. Şti.',    tutar: 15600,  kanal: 'Portföy',           durum: 'Portföyde', aciklama: 'Vadeli çek' },
    ];

    // Belge / işlem numarası standardı:
    // PREFIX + YYYYMMDD + USERID + 6 haneli sıra
    // Örnek: ACEK2026070610000001 (ACEK + 20260706 + kullanıcı 10 + sıra 000001)
    const TCR_USER_ID = '10';
    const TCR_SEQ = { TAH: 3, ODE: 2, ACEK: 3, VCEK: 2, ASEN: 2, VSEN: 2 };
    const TCR_PORTFOY_EVRAKLAR = {
      cek: [
        { id:'ACEK2026070610000001', no:'ACEK2026070610000001', cari:'Anadolu Hırdavat San.', lehtar:'Marmara Tekstil A.Ş.', banka:'Garanti Bankası', tarih:'2026-07-02', vade:'2026-08-15', tutar:32500, kesideci:'Anadolu Hırdavat San.' },
        { id:'ACEK2026070610000002', no:'ACEK2026070610000002', cari:'Ege Lojistik Ltd. Şti.', lehtar:'Marmara Tekstil A.Ş.', banka:'İş Bankası', tarih:'2026-07-05', vade:'2026-08-30', tutar:15600, kesideci:'Ege Lojistik Ltd. Şti.' },
      ],
      senet: [
        { id:'ASEN2026070610000001', no:'ASEN2026070610000001', cari:'Karadeniz Mobilya A.Ş.', lehtar:'Marmara Tekstil A.Ş.', banka:'-', tarih:'2026-07-03', vade:'2026-09-10', tutar:40000, borclu:'Karadeniz Mobilya A.Ş.' },
      ]
    };

    function tcrDateCode(d = new Date()) {
      return d.getFullYear() + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
    }
    function nextTcrNo(prefix) {
      const seq = String(TCR_SEQ[prefix] || 1).padStart(6,'0');
      TCR_SEQ[prefix] = (TCR_SEQ[prefix] || 1) + 1;
      return `${prefix}${tcrDateCode()}${TCR_USER_ID}${seq}`;
    }
    function getCariIslemPrefix(tip) {
      if (tip === 'tahsilat') return 'TAH';
      if (tip === 'odeme') return 'ODE';
      if (tip === 'alinan_cek') return 'ACEK';
      if (tip === 'verilen_cek') return 'VCEK';
      if (tip === 'alinan_senet') return 'ASEN';
      if (tip === 'verilen_senet') return 'VSEN';
      return 'ISL';
    }

    function ciIcon(svg) { return svg; }
    const CI_SVG_EYE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>`;
    const CI_SVG_EDIT = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></svg>`;
    const CI_SVG_LOCK_OPEN = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M7 10V7a5 5 0 0 1 9.5-2"/></svg>`;
    const CI_SVG_LOCK = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="10" width="18" height="11" rx="2"/><path d="M7 10V7a5 5 0 0 1 10 0v3"/></svg>`;
    const CI_SVG_MORE = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/></svg>`;

    function ciStatusBadge(status) {
      const cls = status === 'Onaylandı' ? 'status active' : status === 'Bekliyor' ? 'status warning' : 'status';
      return `<span class="${cls}">${status}</span>`;
    }
    function ciTipLabel(tip) { return CARI_ISLEM_TIPLERI.find(x => x.id === tip)?.label || tip; }
    function ciIsLocked(row, index) { return index > 3; }
    function showCariLockInfo(no, locked) {
      toast(locked ? `${no} kaydı kilitli` : `${no} kaydı düzenlenebilir`, locked ? 'warning' : 'success');
    }
    function ciRow(row, index) {
      const outgoing = ['odeme','verilen_cek','verilen_senet'].includes(row.tip);
      const locked = ciIsLocked(row,index);
      return `<tr data-tip="${row.tip}" data-no="${row.no}">
        <td data-label="İşlem No" class="mono"><strong>${row.no}</strong></td>
        <td data-label="Tip">${ciTipLabel(row.tip)}</td>
        <td data-label="Tarih">${fmtDate(row.tarih)}</td>
        <td data-label="Cari"><strong>${row.cari}</strong></td>
        <td data-label="Kasa / Banka / Portföy" style="color:${outgoing?'#dc2626':'#059669'};font-weight:800">${row.kanal}</td>
        <td data-label="Tutar" class="num" style="color:${outgoing?'#dc2626':'#059669'};font-weight:900">${outgoing?'- ':''}${fmtMoney(row.tutar)}</td>
        <td data-label="Durum">${ciStatusBadge(row.durum)}</td>
        <td data-label="Açıklama">${row.aciklama || '-'}</td>
        <td data-label="İşlem"><div class="tcr-row-actions">
          <button type="button" class="icon-btn" title="Gör" onclick="openCariIslemDetail('${row.no}')">${CI_SVG_EYE}</button>
          <button type="button" class="icon-btn success" title="Düzenle" onclick="openCariIslemModal('${row.tip}','${row.no}')">${CI_SVG_EDIT}</button>
          
          <button type="button" class="icon-btn ci-output-trigger" title="Diğer işlemler" onclick="toggleCariOutputMenu(event,'${row.no}')">${CI_SVG_MORE}</button>
        </div></td>
      </tr>`;
    }

    bootPage('cari-islemler', () => {
      const rows = MOCK_CARI_ISLEM.map(ciRow).join('');
      return `
      <div class="page-head">
        <div><div class="breadcrumb"><a href="dashboard.html">Genel</a><span>›</span><a href="cari.html">Cari</a><span>›</span><span>Cari İşlemleri</span></div>
        <h1 class="page-title">${ICONS.briefcase} Cari İşlemleri</h1><div class="page-sub">Tahsilat, ödeme, çek ve senet işlemleri</div></div>
        <div class="page-actions"><button class="btn btn-ghost" onclick="toast('Cari hareket raporu indirildi (prototip)')">${ICONS.download} Rapor</button><button class="btn btn-primary" onclick="openCariIslemModal('tahsilat')">${ICONS.plus} Yeni Tahsilat</button></div>
      </div>
      <div class="tcr-ac-grid">
        ${CARI_ISLEM_KARTLARI.map(t=>{const c=MOCK_CARI_ISLEM.filter(f=>(t.match||[t.id]).includes(f.tip)).length;const cc=t.color.includes('accent')?'green':t.color.includes('danger')?'red':t.color.includes('primary')?'blue':'orange';return `<button type="button" class="tcr-action-card tcr-ac-${cc}" onclick="openCariIslemModal('${t.actionTip}')"><span class="tcr-ac-icon">${ICONS[t.iconKey]||ICONS.file}</span><span class="tcr-ac-content"><span class="tcr-ac-title">${t.label}</span><span class="tcr-ac-desc">${t.desc}</span></span><span class="tcr-ac-badge">${c}</span></button>`}).join('')}

    function filterCariIslemTable(v) {
      const lv = v.toLowerCase();
      document.querySelectorAll('#cariIslemTable tbody tr').forEach(r => {
        r.style.display = r.textContent.toLowerCase().includes(lv) ? '' : 'none';
      });
    }

    function filterCariIslemTip(tip) {
      document.querySelectorAll('#cariIslemTable tbody tr').forEach(r => {
        r.style.display = (!tip || r.dataset.tip === tip) ? '' : 'none';
      });
    }

    function filterCariIslemDurum(durum) {
      document.querySelectorAll('#cariIslemTable tbody tr').forEach(r => {
        r.style.display = (!durum || r.textContent.includes(durum)) ? '' : 'none';
      });
    }

    let aktifCekSenetTur = 'cek';

    function openCariIslemModal(tip, no) {
      if (tip === 'tahsilat' || tip === 'odeme') openCariOdemeModal(tip, no);
      else openCekSenetModal(tip, no);
    }

    function openCariOdemeModal(tip, no) {
      openModal('cariOdemeModal');
      setTimeout(() => {
        const data = no ? MOCK_CARI_ISLEM.find(x => x.no === no) : null;
        const activeTip = data?.tip || tip || 'tahsilat';
        const title = document.querySelector('#cariOdemeModal .modal-title');
        const tipEl = document.getElementById('co-tip');
        const noEl = document.getElementById('co-no');
        const cariEl = document.getElementById('co-cari');
        if (tipEl) tipEl.value = activeTip;
        if (noEl) noEl.value = data?.no || nextTcrNo(activeTip === 'odeme' ? 'ODE' : 'TAH');
        if (cariEl) cariEl.value = data?.cari || cariEl.value || 'Marmara Tekstil A.Ş.';
        if (title) title.textContent = activeTip === 'odeme' ? 'Yeni Ödeme' : 'Yeni Tahsilat';
        updateCariOdemeBakiyeByName(cariEl?.value || '');
      }, 30);
    }

    function openCekSenetModal(tip, no) {
      openModal('cekSenetModal');
      setTimeout(() => {
        const data = no ? MOCK_CARI_ISLEM.find(x => x.no === no) : null;
        const activeTip = data?.tip || tip || 'cek_islemi';
        aktifCekSenetTur = activeTip.includes('senet') ? 'senet' : 'cek';
        const yon = activeTip.startsWith('verilen') ? 'verilen' : 'alinan';
        const title = document.querySelector('#cekSenetModal .modal-title');
        const yonEl = document.getElementById('cs-yon');
        const noEl = document.getElementById('cs-no');
        const cariEl = document.getElementById('cs-cari');
        if (yonEl) yonEl.value = yon;
        if (noEl) noEl.value = data?.no || nextTcrNo(getCariIslemPrefix(yon + '_' + aktifCekSenetTur));
        if (cariEl) cariEl.value = data?.cari || cariEl.value || 'Marmara Tekstil A.Ş.';
        if (title) title.textContent = aktifCekSenetTur === 'senet' ? 'Senet İşlemi' : 'Çek İşlemi';
        syncCekSenetModal();
        updateCekSenetBakiyeByName(cariEl?.value || '');
      }, 30);
    }

    function updateCariOdemeBakiye(id) {
      const rec = MOCK.cari.find(c => (c.kod || String(c.id)) === id);
      if (rec) renderCariOdemeBakiye(rec);
    }

    function updateCariOdemeBakiyeByName(ad) {
      const rec = MOCK.cari.find(c => c.ad === ad) || MOCK.cari.find(c => c.ad.toLowerCase().includes(String(ad || '').toLowerCase()));
      if (rec) renderCariOdemeBakiye(rec);
    }

    function renderCariOdemeBakiye(rec) {
      const box = document.getElementById('co-bakiye-box');
      const val = document.getElementById('co-bakiye-value');
      const state = document.getElementById('co-bakiye-state');
      if (!box || !val || !state) return;
      box.style.display = 'inline-flex';
      const bakiye = Number(rec.bakiye || 0);
      const renk = bakiye < 0 ? 'var(--c-danger-500)' : bakiye > 0 ? 'var(--c-accent-600)' : 'var(--text-mute)';
      val.textContent = fmtMoney(Math.abs(bakiye));
      val.style.color = renk;
      state.textContent = bakiye < 0 ? 'Borçlu' : bakiye > 0 ? 'Alacaklı' : 'Bakiyesiz';
    }
    function updateCekSenetBakiye(id) {
      const rec = MOCK.cari.find(c => (c.kod || String(c.id)) === id);
      if (rec) renderCekSenetBakiye(rec);
    }

    function updateCekSenetBakiyeByName(ad) {
      const rec = MOCK.cari.find(c => c.ad === ad) || MOCK.cari.find(c => c.ad.toLowerCase().includes(String(ad || '').toLowerCase()));
      if (rec) renderCekSenetBakiye(rec);
    }

    function renderCekSenetBakiye(rec) {
      const box = document.getElementById('cs-bakiye-box');
      const val = document.getElementById('cs-bakiye-value');
      const state = document.getElementById('cs-bakiye-state');
      if (!box || !val || !state) return;
      box.style.display = 'inline-flex';
      const bakiye = Number(rec.bakiye || 0);
      const renk = bakiye < 0 ? 'var(--c-danger-500)' : bakiye > 0 ? 'var(--c-accent-600)' : 'var(--text-mute)';
      val.textContent = fmtMoney(Math.abs(bakiye));
      val.style.color = renk;
      state.textContent = bakiye < 0 ? 'Borçlu' : bakiye > 0 ? 'Alacaklı' : 'Bakiyesiz';
    }


    function syncCariOdemeModal() {
      const tip = document.getElementById('co-tip')?.value || 'tahsilat';
      const title = document.querySelector('#cariOdemeModal .modal-title');
      if (title) title.textContent = tip === 'odeme' ? 'Yeni Ödeme' : 'Yeni Tahsilat';
      updateCariOdemeBakiyeByName(document.getElementById('co-cari')?.value || '');
    }

    function populatePortfolioEvrakOptions() {
      const portfoy = document.getElementById('cs-portfoy');
      if (!portfoy) return;
      const list = TCR_PORTFOY_EVRAKLAR[aktifCekSenetTur] || [];
      const current = portfoy.value;
      portfoy.innerHTML = '<option value="">Portföyden evrak seçiniz</option>' + list.map(x =>
        `<option value="${x.id}">${x.no} · ${x.cari} · ${fmtMoney(x.tutar)} · ${fmtDate(x.vade)}</option>`
      ).join('');
      if (current && list.some(x => x.id === current)) portfoy.value = current;
    }

    function fillSelectedPortfolioEvrak() {
      const portfoy = document.getElementById('cs-portfoy');
      if (!portfoy || !portfoy.value) return;
      const rec = (TCR_PORTFOY_EVRAKLAR[aktifCekSenetTur] || []).find(x => x.id === portfoy.value);
      if (!rec) return;
      const setVal = (id, val) => { const el = document.getElementById(id); if (el) el.value = val ?? ''; };
      setVal('cs-cari', rec.cari);
      setVal('cs-lehtar', rec.lehtar);
      setVal('cs-alacakli', rec.lehtar);
      setVal('cs-banka', rec.banka);
      setVal('cs-duzenleme', rec.tarih);
      setVal('cs-keside-tarihi', rec.tarih);
      setVal('cs-vade', rec.vade);
      setVal('cs-tutar', rec.tutar);
      setVal('cs-cek-no', rec.no);
      setVal('cs-senet-no', rec.no);
      setVal('cs-kesideci', rec.kesideci || rec.cari);
      setVal('cs-borclu', rec.borclu || rec.cari);
      updateCekSenetBakiyeByName(rec.cari);
      toast('Portföy evrak bilgileri forma aktarıldı', 'success');
    }

    function syncCekSenetModal() {
      const yon = document.getElementById('cs-yon')?.value || 'alinan';
      const kaynakEl = document.getElementById('cs-kaynak');
      const kaynak = kaynakEl?.value || 'kendi';
      populatePortfolioEvrakOptions();
      const tip = `${yon}_${aktifCekSenetTur}`;
      const title = document.querySelector('#cekSenetModal .modal-title');
      if (title) title.textContent = aktifCekSenetTur === 'senet' ? 'Senet İşlemi' : 'Çek İşlemi';

      if (kaynakEl) {
        kaynakEl.closest('.form-field').style.display = yon === 'verilen' ? '' : 'none';
        kaynakEl.options[0].textContent = aktifCekSenetTur === 'senet' ? 'Kendi Senedimiz' : 'Kendi Çekimiz';
        kaynakEl.options[1].textContent = aktifCekSenetTur === 'senet' ? 'Müşteri Senedi' : 'Müşteri Çeki';
      }

      const visibleByTip = {
        alinan_cek: ['cekNo','kesideci','banka','sube','hesap','kesideTarihi'],
        verilen_cek_kendi: ['evrakKaynak','cekNo','kocan','bankaHesabi','lehtar','duzenleme'],
        verilen_cek_musteri: ['evrakKaynak','portfoyEvrak','lehtar','duzenleme'],
        alinan_senet: ['senetNo','borclu','duzenleme'],
        verilen_senet_kendi: ['evrakKaynak','senetNo','alacakli','duzenleme'],
        verilen_senet_musteri: ['evrakKaynak','portfoyEvrak','alacakli','duzenleme'],
      };
      const key = yon === 'verilen' ? `${tip}_${kaynak}` : tip;
      const allowed = visibleByTip[key] || [];
      document.querySelectorAll('[data-cs-field]').forEach(el => {
        el.style.display = allowed.includes(el.dataset.csField) ? '' : 'none';
      });

      const durum = document.getElementById('cs-durum');
      if (durum) durum.value = yon === 'alinan' ? 'Portföyde' : kaynak === 'musteri' ? 'Ciro Edilecek' : 'Bekliyor';
      if (yon === 'verilen' && kaynak === 'musteri') {
        const portfoy = document.getElementById('cs-portfoy');
        if (portfoy?.value) fillSelectedPortfolioEvrak();
      }
      updateCekSenetBakiyeByName(document.getElementById('cs-cari')?.value || '');
    }

    function getCariIslem(no) {
      return MOCK_CARI_ISLEM.find(x => x.no === no) || MOCK_CARI_ISLEM[0];
    }

      return CARI_ISLEM_TIPLERI.find(t => t.id === tip)?.label || tip;

      if (body) {
        const tipLabel = cariIslemTipLabel(h.tip);
        const isPositive = ['tahsilat','alinan_cek','alinan_senet'].includes(h.tip);
        const heroColor = isPositive ? '#16a34a' : '#dc2626';
        const heroBg = isPositive ? '#dcfce7' : '#fee2e2';
        body.innerHTML = `

      if (digits.startsWith('0')) return digits.replace(/(\d{4})(\d{3})(\d{2})(\d{2})/, '$1 $2 $3 $4');
      if (digits.length === 10) return ('0' + digits).replace(/(\d{4})(\d{3})(\d{2})(\d{2})/, '$1 $2 $3 $4');
      return tel;

    function toggleCariOutputMenu(no, ev) {
      ev?.stopPropagation?.();

      const menu = document.getElementById('ci-output-' + no);
      const willOpen = !menu?.classList.contains('open');
      closeCariOutputMenus();
      if (!menu || !willOpen) return;

      // Menü tablo hücresi içinde kalınca satır ikonlarıyla karışıyordu.
      // Açılırken body altına taşınıyor; bu nedenle her zaman en üst katmanda görünür.
      if (menu.parentElement !== document.body) document.body.appendChild(menu);
      menu.classList.add('open');

      const r = btn.getBoundingClientRect();
      const mw = menu.offsetWidth || 218;
      const mh = menu.offsetHeight || 252;
      let left = r.right - mw;
      let top = r.bottom + 8;

      // Menü satır yazılarının üstüne binmesin; mümkünse butonun solunda ve satırdan ayrık dursun.
      // Alt tarafta yer yoksa üste açılır. Arka plan opak tutulduğu için tablo yazıları görünmez.

      if (left < 12) left = 12;
      if (left + mw > window.innerWidth - 12) left = window.innerWidth - mw - 12;
      if (top + mh > window.innerHeight - 12) top = Math.max(12, r.top - mh - 8);

      menu.style.left = left + 'px';
      menu.style.top = top + 'px';
    }

    function pdfEscape(str) {
      return String(str ?? '').replace(/[\\()]/g, '\\$&').replace(/[ğĞ]/g,'g').replace(/[üÜ]/g,'u').replace(/[şŞ]/g,'s').replace(/[ıİ]/g,'i').replace(/[öÖ]/g,'o').replace(/[çÇ]/g,'c');

    function makeCorporatePdf(no) {

      line(34,298,560,298,2);

      t('Cari Kod',46,238,7,true); t(d.cariKod,46,224,10,true); t('Cari Unvan',150,238,7,true); t(d.cari,150,224,10,true);

      t('Yon',322,207,7,true); t(d.yon,322,193,9,true); t('Durum',430,207,7,true); t(d.durum,430,193,9,true);
      // Açıklama ve toplam

      rect(34,82,300,50); t('Belge Toplami',50,113,9,true); t(d.tutar,50,91,19,true); t('Hazirlayan: '+d.hazirlayan,214,113,8); t('Yazdirma: '+d.yazdirma,214,96,8);
      rect(350,82,60,50); t('Hazirlayan',357,113,7,true); line(357,94,403,94,.6); t(d.hazirlayan,357,85,6);
      rect(420,82,60,50); t('Kontrol',432,113,7,true); line(427,94,473,94,.6); t(d.kontrol,432,85,6);
      rect(490,82,60,50); t('Onay',508,113,7,true); line(497,94,543,94,.6); t(d.onay,508,85,6);
      line(34,52,560,52,1); t('Tcr3WEB Kurumsal Cikti Sistemi - A5 Yatay',42,38,7); t('Sayfa 1 / 1',510,38,7);
      const stream = ops.join('\n');
      const objects = [
        '1 0 obj << /Type /Catalog /Pages 2 0 R >> endobj',
        '2 0 obj << /Type /Pages /Kids [3 0 R] /Count 1 >> endobj',
        '3 0 obj << /Type /Page /Parent 2 0 R /MediaBox [0 0 595 420] /Resources << /Font << /F1 4 0 R /F2 6 0 R >> >> /Contents 5 0 R >> endobj',

      pdf += `trailer << /Size ${objects.length + 1} /Root 1 0 R >>\nstartxref\n${xref}\n%%EOF`;

        const cssHidden = row.style.display === 'none';
        const pageHidden = row.hidden;
        if (cssHidden || pageHidden) return;

        const tutarText = row.querySelector('td[data-label="Tutar"]')?.textContent || '';
        const tutar = parseFloat(tutarText.replace(/[^0-9,-]/g, '').replace(',', '.')) || 0;
        const isCikis = tutarText.includes('-');

        if (isCikis) cikis += tutar;
        else giris += tutar;
      });

      const net = giris - cikis;
      const girisEl = document.getElementById('ciFooterGiris');
      const cikisEl = document.getElementById('ciFooterCikis');
      const netEl = document.getElementById('ciFooterNet');
      if (girisEl) girisEl.textContent = fmtMoney(giris);
      if (cikisEl) cikisEl.textContent = fmtMoney(cikis);
      if (netEl) {
        netEl.textContent = fmtMoney(Math.abs(net));
        netEl.parentElement.classList.toggle('is-negative', net < 0);
        netEl.parentElement.classList.toggle('is-positive', net > 0);
        netEl.parentElement.setAttribute('data-state', net < 0 ? 'Çıkış' : net > 0 ? 'Giriş' : 'Denge');
      }
    }

    function scheduleCariIslemFooterTotals() {
      requestAnimationFrame(updateCariIslemFooterTotals);
    }

    function initCariIslemFooterTotals() {
      const table = document.getElementById('cariIslemTable');
      if (!table || table.dataset.ciFooterReady === '1') return;
      table.dataset.ciFooterReady = '1';

      const tbody = table.tBodies[0];
      if (tbody) {
        new MutationObserver(scheduleCariIslemFooterTotals).observe(tbody, {
          subtree: true,
          childList: true,
          attributes: true,
          attributeFilter: ['hidden', 'style', 'data-tcr-filter-hidden']
        });
      }

      table.addEventListener('click', scheduleCariIslemFooterTotals);
      table.addEventListener('change', scheduleCariIslemFooterTotals);
      scheduleCariIslemFooterTotals();
    }

    document.addEventListener('DOMContentLoaded', () => { initCariIslemFooterTotals(); });
    window.addEventListener('load', () => { initCariIslemFooterTotals(); });

  

    function tcrNormalizeCariActions(tableId) {
      const table = document.getElementById(tableId);
      if (!table) return;
      table.querySelectorAll('tbody td[data-label="İşlem"]').forEach((cell) => {
        const group = cell.querySelector('.tcr-row-actions');
        if (!group) return;
        const buttons = Array.from(group.querySelectorAll('button'));
        const lockButtons = buttons.filter((btn) => {
          const title = (btn.getAttribute('title') || '').toLocaleLowerCase('tr-TR');
          return btn.hasAttribute('data-tcr-lock-action') || btn.classList.contains('tcr-lock-open') ||
            btn.classList.contains('tcr-lock-closed') || title.includes('kilit') || title.includes('düzenlenebilir');
        });
        const canonicalLock = lockButtons.find(btn => btn.hasAttribute('data-tcr-lock-action')) || lockButtons[0];
        lockButtons.forEach(btn => { if (btn !== canonicalLock) btn.remove(); });

        const live = Array.from(group.querySelectorAll('button'));
        const view = live.find(btn => /gör|gor/i.test(btn.getAttribute('title') || ''));
        const edit = live.find(btn => /düzenle|duzenle/i.test(btn.getAttribute('title') || ''));
        const more = live.find(btn => /diğer|diger|menü|menu/i.test(btn.getAttribute('title') || ''));
        [view, edit, canonicalLock, more].filter(Boolean).forEach(btn => group.appendChild(btn));
      });
    }

    function tcrInitCariActionGuard(tableId) {
      const run = () => tcrNormalizeCariActions(tableId);
      run();
      setTimeout(run, 60);
      setTimeout(run, 250);
      const table = document.getElementById(tableId);
      if (!table || table.dataset.actionGuard === '1') return;
      table.dataset.actionGuard = '1';
      let queued = false;
      new MutationObserver(() => {
        if (queued) return;
        queued = true;
        requestAnimationFrame(() => { queued = false; run(); });
      }).observe(table.tBodies[0] || table, {subtree:true, childList:true});
    }

  </script>
</body>
