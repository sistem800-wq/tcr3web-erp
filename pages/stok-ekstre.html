function qty(v){return Number(v||0).toLocaleString('tr-TR')}
function rowHtml(r,i){const stock=true;return `<tr class="clickable-row" onclick="openStokHareketDetay(${i})"><td>${fmtDate(r[0])}</td><td class="mono strong">${r[1]}</td><td><span class="badge badge-info">${r[2]}</span></td><td>${r[3]}</td><td class="num ekstre-positive">${r[4]?qty(r[4]):'-'}</td><td class="num ekstre-negative">${r[5]?qty(r[5]):'-'}</td><td class="num strong">${qty(r[6])}</td><td class="tcr-action-column"><div class="tcr-action-buttons"><button class="icon-btn tcr-action-blue" onclick="event.stopPropagation();openStokHareketDetay(${i})" title="Hareket Detayı">${ICONS.eye}</button></div></td></tr>`}
function applyEkstreFilter(){const f=document.getElementById('dateFrom').value,t=document.getElementById('dateTo').value;const rows=EKSTRE_ROWS.filter(r=>(!f||r[0]>=f)&&(!t||r[0]<=t));document.getElementById('ekstreBody').innerHTML=rows.length?rows.map((r,i)=>rowHtml(r,i)).join(''):'<tr><td colspan="8" class="ekstre-empty">Seçilen tarih aralığında kayıt bulunamadı.</td></tr>';const si=rows.reduce((s,r)=>s+Number(r[4]||0),0),so=rows.reduce((s,r)=>s+Number(r[5]||0),0),bal=rows.length?rows[0][6]:0,stock='stok-ekstre'==='stok-ekstre';document.getElementById('sumIn').textContent=stock?qty(si):money(si);document.getElementById('sumOut').textContent=stock?qty(so):money(so);document.getElementById('sumBalance').textContent=stock?qty(bal):money(bal);document.getElementById('rangeInfo').textContent=(f?fmtDate(f):'İlk kayıt')+' - '+(t?fmtDate(t):'Bugün');}
function setPeriod(p,el){document.querySelectorAll('.ekstre-period-card').forEach(x=>x.classList.remove('is-active'));el.classList.add('is-active');const end='2026-07-12',d=new Date(end+'T12:00:00');if(p==='daily'){}else if(p==='weekly')d.setDate(d.getDate()-6);else if(p==='monthly')d.setMonth(d.getMonth()-1);else d.setFullYear(d.getFullYear()-1);document.getElementById('dateFrom').value=d.toISOString().slice(0,10);document.getElementById('dateTo').value=end;applyEkstreFilter();}
function updateKpis(){const end=new Date('2026-07-12T12:00:00');[['Daily',0],['Weekly',6],['Monthly',30],['Yearly',365]].forEach(([id,days])=>{const start=new Date(end);start.setDate(start.getDate()-days);const total=EKSTRE_ROWS.filter(r=>new Date(r[0]+'T12:00:00')>=start).reduce((s,r)=>s+Number(r[4]||0)-Number(r[5]||0),0);document.getElementById('kpi'+id).textContent='stok-ekstre'==='stok-ekstre'?qty(total):money(total);})}

function openStokHareketDetay(i){
  const f=document.getElementById('dateFrom').value,t=document.getElementById('dateTo').value;
  const rows=EKSTRE_ROWS.filter(r=>(!f||r[0]>=f)&&(!t||r[0]<=t));
  const r=rows[i]; if(!r)return;
  document.getElementById('sdKod').textContent=SELECTED_STOK_KOD;
  document.getElementById('sdAd').textContent=SELECTED_STOK_AD;
  document.getElementById('sdTarih').textContent=fmtDate(r[0]);
  document.getElementById('sdFis').textContent=r[1];
  document.getElementById('sdTur').textContent=r[2];
  document.getElementById('sdDepo').textContent=r[3];
  document.getElementById('sdGiris').textContent=r[4]?qty(r[4]):'-';
  document.getElementById('sdCikis').textContent=r[5]?qty(r[5]):'-';
  document.getElementById('sdKalan').textContent=qty(r[6]);
  const hareketMiktar=Number(r[4]||r[5]||0);
  document.getElementById('sdLineBody').innerHTML=`<tr><td class="mono strong col-code">${SELECTED_STOK_KOD}</td><td class="col-name">${SELECTED_STOK_AD}</td><td class="num col-qty">${qty(hareketMiktar)}</td><td class="col-unit">Adet</td><td class="col-warehouse">${r[3]}</td><td class="col-type"><span class="badge badge-info">${r[2]}</span></td></tr>`;
  openModal('stokHareketDetayModal');
}

function ekstreOutput(type){const labels={whatsapp:'WhatsApp paylaşımı hazırlandı',email:'E-posta gönderimi hazırlandı',pdf:'PDF dosyası hazırlandı'};toast(labels[type]||'İşlem tamamlandı','success')}
setTimeout(()=>{updateKpis();applyEkstreFilter();},80);
</script></body></html>
