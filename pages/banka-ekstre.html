<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Tcr3WEB · Banka Ekstresi</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../assets/css/style.css?v=20260712-653" />
  <link rel="stylesheet" href="../assets/css/responsive-master.css?v=20260713-591" />
  <link rel="stylesheet" href="../assets/css/performance.css?v=20260711-700" />
  <link rel="stylesheet" href="../assets/css/tcr-table.css?v=20260717-557" />
  <link rel="stylesheet" href="../assets/css/kpi-standard.css?v=20260712-694" />
  <link rel="stylesheet" href="../assets/css/ekstre.css?v=20260712-662" />  <link rel="stylesheet" href="../assets/css/text-readability.css?v=20260712-657" />
  <link rel="stylesheet" href="../assets/css/shared-shell.css?v=20260717-550" />
</head><body><div id="app" class="app"></div>  <script src="../assets/js/app.js?v=20260717-552"></script>
  <script src="../assets/js/tcr-actions.js?v=20260713-600"></script>
  <script src="../assets/js/master-init.js?v=20260713-583"></script>
  <script src="../assets/js/tcr-table.js?v=20260713-587"></script>
<script>
document.documentElement.classList.add('tcr-ekstre-page');
const __EKSTRE_STABILITY_KEY='tcr3:ekstre-stability-v608';
if(!sessionStorage.getItem(__EKSTRE_STABILITY_KEY)){Object.keys(localStorage).filter(k=>k.includes('table-sort:')&&k.includes('ekstre')).forEach(k=>localStorage.removeItem(k));sessionStorage.setItem(__EKSTRE_STABILITY_KEY,'1');}

const EKSTRE_ROWS=[["2026-07-12", "BNK20260712009", "Havale Girişi", "Marmara Tekstil", 85000, 0, 1501720], ["2026-07-11", "BNK20260711006", "EFT Çıkışı", "Yıldız Plastik ödeme", 0, 64000, 1416720], ["2026-07-08", "BNK20260708003", "POS Aktarımı", "Gün sonu POS aktarımı", 32750, 0, 1480720], ["2026-07-05", "BNK20260705002", "Vergi Ödemesi", "KDV ödemesi", 0, 28750, 1447970], ["2026-06-30", "BNK20260630008", "Havale Girişi", "Ege Lojistik", 56000, 0, 1476720], ["2026-06-18", "BNK20260618004", "EFT Çıkışı", "Tedarikçi ödemesi", 0, 91000, 1420720], ["2026-05-24", "BNK20260524007", "Faiz Geliri", "Vadeli hesap getirisi", 18500, 0, 1511720], ["2026-04-01", "BNK20260401001", "Devir", "Dönem açılışı", 1493220, 0, 1493220]];
bootPage('banka-ekstre',()=>`<div class="page-head"><div><div class="breadcrumb"><a href="dashboard.html">Genel</a><span>›</span><a href="#">Finans</a><span>›</span><span>Banka Ekstresi</span></div><h1 class="page-title">Banka Ekstresi</h1><div class="page-sub">Banka hesabı bazında giriş, çıkış ve bakiye hareketleri</div></div><div class="page-actions ekstre-actions"><button class="btn btn-ghost" onclick="ekstreOutput('whatsapp')">${ICONS.whatsapp} WhatsApp</button><button class="btn btn-ghost" onclick="ekstreOutput('email')">${ICONS.mail} E-posta</button><button class="btn btn-ghost" onclick="window.print()">${ICONS.print} Yazdır</button><button class="btn btn-ghost" onclick="ekstreOutput('pdf')">${ICONS.file_text} PDF</button></div></div>
<div class="tcr-ac-grid"><button class="tcr-action-card tcr-ac-blue ekstre-period-card" onclick="setPeriod('daily',this)"><span class="tcr-ac-icon">${ICONS.calendar}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Günlük</span><span class="tcr-ac-desc" id="kpiDaily">0,00 ₺</span></span></button><button class="tcr-action-card tcr-ac-green ekstre-period-card" onclick="setPeriod('weekly',this)"><span class="tcr-ac-icon">${ICONS.trend_up}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Haftalık</span><span class="tcr-ac-desc" id="kpiWeekly">0,00 ₺</span></span></button><button class="tcr-action-card tcr-ac-orange ekstre-period-card" onclick="setPeriod('monthly',this)"><span class="tcr-ac-icon">${ICONS.chart}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Aylık</span><span class="tcr-ac-desc" id="kpiMonthly">0,00 ₺</span></span></button><button class="tcr-action-card tcr-ac-purple ekstre-period-card" onclick="setPeriod('yearly',this)"><span class="tcr-ac-icon">${ICONS.file_text}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Yıllık</span><span class="tcr-ac-desc" id="kpiYearly">0,00 ₺</span></span></button></div>
<div class="card ekstre-filter-card"><div class="card-body"><div class="ekstre-filter-row"><div class="form-field ekstre-entity-field"><label class="form-label">Banka Hesabı</label><div class="ekstre-picker-row"><input class="form-input" id="entitySelect" value="İş Bankası - CARİ" readonly /><input type="hidden" id="entityId" value="BNK002" /><button class="btn btn-primary ekstre-picker-btn" type="button" onclick="openPickerFor('banka','entitySelect','entityId',onEkstreEntitySelected)">Banka Seç</button></div></div><div class="form-field"><label class="form-label">Başlangıç Tarihi</label><input class="form-input" id="dateFrom" type="date" value="2026-07-01"/></div><div class="form-field"><label class="form-label">Bitiş Tarihi</label><input class="form-input" id="dateTo" type="date" value="2026-07-12"/></div><div class="ekstre-filter-action"><button class="btn btn-primary" onclick="applyEkstreFilter()">${ICONS.filter} Listele</button></div></div></div></div>
<div class="card"><div class="card-head"><div class="card-title">Hareket Listesi</div><span class="text-soft" id="rangeInfo"></span></div><div class="card-body" style="padding:0"><div class="table-wrap"><table class="data" id="ekstreTable" data-no-record-lock="true" data-tcr-sort="off" data-tcr-pagination="off" data-tcr-search="off"><thead><tr><th class="">Tarih</th><th class="">Referans No</th><th class="">İşlem Türü</th><th class="">Açıklama</th><th class="num">Giriş</th><th class="num">Çıkış</th><th class="num">Bakiye</th></tr></thead><tbody id="ekstreBody"></tbody></table></div><div class="ekstre-summary"><span>Toplam Giriş: <strong class="ekstre-positive" id="sumIn">0,00 ₺</strong></span><span>Toplam Çıkış: <strong class="ekstre-negative" id="sumOut">0,00 ₺</strong></span><span>Son Bakiye/Kalan: <strong id="sumBalance">0,00</strong></span></div></div></div>`);
function onEkstreEntitySelected(id,ad){const el=document.getElementById('entitySelect');if(el&&ad)el.value=ad;toast((ad||'Banka hesabı')+' seçildi','success');applyEkstreFilter();}
function money(v){return Number(v||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺'}
function qty(v){return Number(v||0).toLocaleString('tr-TR')}
function rowHtml(r){const stock='banka-ekstre'==='stok-ekstre';return `<tr><td>${fmtDate(r[0])}</td><td class="mono strong">${r[1]}</td><td><span class="badge badge-info">${r[2]}</span></td><td>${r[3]}</td><td class="num ekstre-positive">${r[4]? (stock?qty(r[4]):money(r[4])):'-'}</td><td class="num ekstre-negative">${r[5]? (stock?qty(r[5]):money(r[5])):'-'}</td><td class="num strong">${stock?qty(r[6]):money(r[6])}</td></tr>`}
function applyEkstreFilter(){const f=document.getElementById('dateFrom').value,t=document.getElementById('dateTo').value;const rows=EKSTRE_ROWS.filter(r=>(!f||r[0]>=f)&&(!t||r[0]<=t));document.getElementById('ekstreBody').innerHTML=rows.length?rows.map(rowHtml).join(''):'<tr><td colspan="7" class="ekstre-empty">Seçilen tarih aralığında kayıt bulunamadı.</td></tr>';const si=rows.reduce((s,r)=>s+Number(r[4]||0),0),so=rows.reduce((s,r)=>s+Number(r[5]||0),0),bal=rows.length?rows[0][6]:0,stock='banka-ekstre'==='stok-ekstre';document.getElementById('sumIn').textContent=stock?qty(si):money(si);document.getElementById('sumOut').textContent=stock?qty(so):money(so);document.getElementById('sumBalance').textContent=stock?qty(bal):money(bal);document.getElementById('rangeInfo').textContent=(f?fmtDate(f):'İlk kayıt')+' - '+(t?fmtDate(t):'Bugün');}
function setPeriod(p,el){document.querySelectorAll('.ekstre-period-card').forEach(x=>x.classList.remove('is-active'));el.classList.add('is-active');const end='2026-07-12',d=new Date(end+'T12:00:00');if(p==='daily'){}else if(p==='weekly')d.setDate(d.getDate()-6);else if(p==='monthly')d.setMonth(d.getMonth()-1);else d.setFullYear(d.getFullYear()-1);document.getElementById('dateFrom').value=d.toISOString().slice(0,10);document.getElementById('dateTo').value=end;applyEkstreFilter();}
function updateKpis(){const end=new Date('2026-07-12T12:00:00');[['Daily',0],['Weekly',6],['Monthly',30],['Yearly',365]].forEach(([id,days])=>{const start=new Date(end);start.setDate(start.getDate()-days);const total=EKSTRE_ROWS.filter(r=>new Date(r[0]+'T12:00:00')>=start).reduce((s,r)=>s+Number(r[4]||0)-Number(r[5]||0),0);document.getElementById('kpi'+id).textContent='banka-ekstre'==='stok-ekstre'?qty(total):money(total);})}
function ekstreOutput(type){const labels={whatsapp:'WhatsApp paylaşımı hazırlandı',email:'E-posta gönderimi hazırlandı',pdf:'PDF dosyası hazırlandı'};toast(labels[type]||'İşlem tamamlandı','success')}
setTimeout(()=>{updateKpis();applyEkstreFilter();},80);
</script></body></html>
