<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10243f"><link rel="manifest" href="../manifest.webmanifest"><title>Tcr3WEB · Kasa Yönetimi</title><link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive-master.css?v=20260713-591"><link rel="stylesheet" href="../assets/css/tcr-table.css?v=20260717-547"><link rel="stylesheet" href="../assets/css/kpi-standard.css"><link rel="stylesheet" href="../assets/css/text-readability.css"><link rel="stylesheet" href="../assets/css/finance-flow.css">  <link rel="stylesheet" href="../assets/css/shared-shell.css?v=20260717-547" />
</head><body><div id="app" class="app"></div><script src="../assets/js/app.js"></script><script src="../assets/js/tcr-actions.js?v=20260713-600"></script><script src="../assets/js/master-init.js?v=20260713-583"></script><script src="../assets/js/tcr-table.js?v=20260713-587"></script><script>
bootPage('kasa',()=>{const total=MOCK.kasa.reduce((s,k)=>s+k.bakiye,0),giris=MOCK.kasaHareket.filter(x=>x.tutar>0).reduce((s,x)=>s+x.tutar,0),cikis=MOCK.kasaHareket.filter(x=>x.tutar<0).reduce((s,x)=>s+Math.abs(x.tutar),0);let running=total;return `
<div class="page-head"><div><div class="breadcrumb"><a href="dashboard.html">Genel</a><span>›</span><span>Finans</span><span>›</span><span>Kasa</span></div><h1 class="page-title">Kasa Yönetimi</h1><div class="page-sub">Kasa kartları, tahsilat, ödeme, virman, gün sonu ve bağlı cari hareketleri</div></div><div class="page-actions"><button class="btn btn-ghost" onclick="location.href='kasa-ekstre.html'">${ICONS.chart} Kasa Ekstresi</button><button class="btn btn-ghost" onclick="openModal('gunSonuModal')">${ICONS.calendar} Gün Sonu</button><button class="btn btn-ghost" onclick="openModal('virmanModal')">${ICONS.wallet} Virman</button><button class="btn btn-primary" onclick="openModal('tahsilatModal')">${ICONS.plus} Yeni Tahsilat</button></div></div>
<div class="finance-summary"><div class="tcr-action-card tcr-ac-blue"><span class="tcr-ac-icon">${ICONS.wallet}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Güncel Kasa</span><span class="tcr-ac-desc">${fmtMoney(total)}</span></span><span class="tcr-ac-badge">${MOCK.kasa.length}</span></div><div class="tcr-action-card tcr-ac-green"><span class="tcr-ac-icon">${ICONS.trend_up}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Toplam Giriş</span><span class="tcr-ac-desc">${fmtMoney(giris)}</span></span></div><div class="tcr-action-card tcr-ac-red"><span class="tcr-ac-icon">${ICONS.trend_down}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Toplam Çıkış</span><span class="tcr-ac-desc">${fmtMoney(cikis)}</span></span></div><div class="tcr-action-card tcr-ac-orange"><span class="tcr-ac-icon">${ICONS.cash}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Net Nakit Akışı</span><span class="tcr-ac-desc">${fmtMoney(giris-cikis)}</span></span></div><div class="tcr-action-card tcr-ac-cyan"><span class="tcr-ac-icon">${ICONS.file_check}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Onay Bekleyen</span><span class="tcr-ac-desc">42.500,00 ₺</span></span><span class="tcr-ac-badge">3</span></div></div>
<div class="finance-tabs"><button class="finance-tab active">Kasa Kartları</button><button class="finance-tab">Hareketler</button><button class="finance-tab">Tahsilatlar</button><button class="finance-tab">Ödemeler</button><button class="finance-tab">Virmanlar</button><button class="finance-tab">Gün Sonu</button></div>
<div class="card mb-6"><div class="card-head"><div class="card-title">Kasa Durumu</div><button class="btn btn-sm btn-ghost" onclick="openModal('kasaModal')">${ICONS.plus} Yeni Kasa</button></div><div class="card-body"><div class="finance-balance-box">${MOCK.kasa.map(k=>`<div class="finance-balance-item"><small>${k.kod} · ${k.tur}</small><strong>${k.ad}</strong><div class="text-success strong mt-2">${fmtMoney(k.bakiye)}</div></div>`).join('')}</div></div></div>
<div class="card"><div class="card-head"><div class="card-title">Kasa Hareketleri</div><div class="finance-toolbar"><input class="form-input" placeholder="İşlem, cari veya açıklama ara"><select class="filter-select"><option>Tüm Kasalar</option>${MOCK.kasa.map(k=>`<option>${k.ad}</option>`).join('')}</select><select class="filter-select"><option>Tüm Durumlar</option><option>Taslak</option><option>Onay Bekliyor</option><option>Onaylandı</option><option>İptal</option></select><button class="btn btn-ghost">${ICONS.filter} Filtrele</button></div></div><div class="card-body" style="padding:0"><div class="table-responsive"><table class="data"><thead><tr><th>İşlem No</th><th>Tarih</th><th>Kasa</th><th>Cari / Açıklama</th><th>Kaynak</th><th>Durum</th><th class="num">Giriş</th><th class="num">Çıkış</th><th class="num">Yürüyen Bakiye</th><th>İşlem</th></tr></thead><tbody>${MOCK.kasaHareket.map((h,i)=>{running-=h.tutar;const st=i%5===1?'pending':i%7===2?'draft':'approved';return `<tr><td class="mono strong">KSH-${String(2026001+i)}</td><td>${fmtDate(h.tarih)}</td><td>${h.kasa}</td><td class="strong">${h.aciklama}</td><td>${h.tip==='Virman'?'Virman':'Cari İşlem'}</td><td><span class="finance-status ${st}">${st==='pending'?'Onay Bekliyor':st==='draft'?'Taslak':'Onaylandı'}</span></td><td class="num money-in">${h.tutar>0?fmtMoney(h.tutar):'-'}</td><td class="num money-out">${h.tutar<0?fmtMoney(Math.abs(h.tutar)):'-'}</td><td class="num running-balance">${fmtMoney(running)}</td><td><div class="finance-actions"><button class="icon-btn" title="Gör">${ICONS.eye}</button><button class="icon-btn" title="Düzenle">${ICONS.edit}</button></div></td></tr>`}).join('')}</tbody></table></div></div><div class="card-foot">Durum : ${MOCK.kasaHareket.length} hareket · Giriş ${fmtMoney(giris)} · Çıkış ${fmtMoney(cikis)}</div></div>
${modalHtml('kasaModal','Yeni Kasa Kartı',`<div class="form-grid-2"><div class="form-field"><label class="form-label">Kasa Kodu</label><input class="form-input" value="KASA04"></div><div class="form-field"><label class="form-label">Kasa Adı</label><input class="form-input" placeholder="Kasa adı"></div><div class="form-field"><label class="form-label">Para Birimi</label><select class="form-input"><option>TRY</option><option>USD</option><option>EUR</option></select></div><div class="form-field"><label class="form-label">Açılış Bakiyesi</label><input class="form-input" value="0,00"></div><div class="form-field full"><label class="form-label">Eksi Bakiye Kuralı</label><select class="form-input"><option>Uyar ve izin ver</option><option>Engelle</option><option>İzin ver</option></select></div></div>`,`<button class="btn btn-outline-danger" onclick="closeModal('kasaModal')">Vazgeç</button><button class="btn btn-success" onclick="closeModal('kasaModal');toast('Kasa kartı kaydedildi','success')">${ICONS.check} Kaydet</button>`)}
${modalHtml('tahsilatModal','Yeni Kasa Tahsilatı',`<div class="finance-modal-note mb-4">Tahsilat kaydedildiğinde cari ve kasa hareketleri aynı işlem numarasıyla bağlanır.</div><div class="form-grid-2"><div class="form-field"><label class="form-label">Kasa</label><select class="form-input">${MOCK.kasa.map(k=>`<option>${k.ad}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Cari</label><button class="btn btn-ghost w-full" type="button">Cari Seç</button></div><div class="form-field"><label class="form-label">Tutar</label><input class="form-input" value="0,00"></div><div class="form-field"><label class="form-label">Durum</label><select class="form-input"><option>Taslak</option><option>Onay Bekliyor</option><option>Onaylandı</option></select></div><div class="form-field full"><label class="form-label">Açıklama</label><textarea class="form-input"></textarea></div></div>`,`<button class="btn btn-outline-danger" onclick="closeModal('tahsilatModal')">Vazgeç</button><button class="btn btn-success" onclick="closeModal('tahsilatModal');toast('Tahsilat kaydedildi','success')">${ICONS.check} Kaydet</button>`)}
${modalHtml('virmanModal','Kasa / Banka Virmanı',`<div class="finance-modal-note mb-4">Tek virman fişi iki bağlı hareket oluşturur. Bir taraf iptal edilirse diğer taraf da kontrollü iptal edilir.</div><div class="form-grid-2"><div class="form-field"><label class="form-label">Kaynak Türü</label><select class="form-input"><option>Kasa</option><option>Banka</option></select></div><div class="form-field"><label class="form-label">Hedef Türü</label><select class="form-input"><option>Banka</option><option>Kasa</option></select></div><div class="form-field"><label class="form-label">Kaynak Hesap</label><select class="form-input">${MOCK.kasa.map(k=>`<option>${k.ad}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Hedef Hesap</label><select class="form-input">${MOCK.banka.map(b=>`<option>${b.banka} - ${b.hesap}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Tutar</label><input class="form-input" value="0,00"></div><div class="form-field"><label class="form-label">Durum</label><select class="form-input"><option>Taslak</option><option>Onay Bekliyor</option><option>Onaylandı</option></select></div></div>`,`<button class="btn btn-outline-danger" onclick="closeModal('virmanModal')">Vazgeç</button><button class="btn btn-success" onclick="closeModal('virmanModal');toast('Virman fişi kaydedildi','success')">${ICONS.check} Kaydet</button>`)}
${modalHtml('gunSonuModal','Gün Sonu Kasa Sayımı',`<div class="form-grid-2"><div class="form-field"><label class="form-label">Kasa</label><select class="form-input">${MOCK.kasa.map(k=>`<option>${k.ad}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Sistem Bakiyesi</label><input class="form-input" value="245.800,00" readonly></div><div class="form-field"><label class="form-label">Fiili Sayım</label><input class="form-input" value="245.800,00"></div><div class="form-field"><label class="form-label">Fark</label><input class="form-input" value="0,00" readonly></div><div class="form-field full"><label class="form-label">Açıklama</label><textarea class="form-input"></textarea></div></div>`,`<button class="btn btn-outline-danger" onclick="closeModal('gunSonuModal')">Vazgeç</button><button class="btn btn-success" onclick="closeModal('gunSonuModal');toast('Gün sonu tamamlandı','success')">${ICONS.check} Onayla</button>`)}
`});</script></body></html>
