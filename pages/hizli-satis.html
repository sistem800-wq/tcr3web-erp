    setInterval(quickUpdateStatusbar,30000);
    function quickReceiptHtml(r){return '<div class="hs-receipt"><center><b>TCR3WEB ERP</b><br>Sistem Yazılım<br>'+r.no+' · '+r.time+'</center><hr>'+r.items.map(function(i){return '<div class="hs-receipt-row"><span>'+i.name+' x'+i.qty+'</span><b>'+money(qLineNet(i))+'</b></div>';}).join('')+'<hr><div class="hs-receipt-row"><span>Ödeme</span><b>'+r.payment+'</b></div><div class="hs-receipt-row"><span>GENEL TOPLAM</span><b>'+money(r.total)+'</b></div></div><div class="hs-print-sizes"><button onclick="quickToast(&quot;80mm fiş yazdırma hazır&quot;)">80 mm</button><button onclick="quickToast(&quot;58mm fiş yazdırma hazır&quot;)">58 mm</button><button onclick="quickToast(&quot;A4 yazdırma hazır&quot;)">A4</button></div>';}
    quickComplete=function(mode){if(!quickCart.length){quickToast('Sepet boş','error');return;}var r={no:'#FIS-'+String(quickSaleNo++).padStart(6,'0'),time:new Date().toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}),items:JSON.parse(JSON.stringify(quickCart)),total:qTotal(),payment:quickPayment==='kart'?'Kart / POS':'Nakit',mode:mode};quickRecentReceipts.unshift(r);quickToast(mode==='return'?'İade işlemi kaydedildi':'Satış tamamlandı');quickOpenModal(mode==='return'?'İade Fişi':'Satış Fişi',quickReceiptHtml(r),function(){quickToast('Fiş yazdırma hazır');});quickCart=[];var n=document.getElementById('quickOrderNote');if(n)n.value='';var p=document.getElementById('quickPaidAmount');if(p)p.value='';quickSaleRefresh();};
    function quickUpdateRecentList(){var list=document.querySelector('.hs-last-list');if(!list||!quickRecentReceipts.length)return;list.innerHTML=quickRecentReceipts.slice(0,5).map(function(r,i){var cls=r.payment.indexOf('Kart')>-1?'card':'cash';return '<button class="hs-last-item" data-action="receipt-view" ondblclick="quickViewReceipt('+i+')"><span class="hs-last-top"><span>'+r.time+'<br><em class="hs-last-code">'+r.no+'</em></span><span class="hs-pay-state '+cls+'">▣</span></span><span><div class="hs-last-amount">'+money(r.total)+'</div><div class="hs-pay-state '+cls+'">● '+r.payment+'</div></span></button>';}).join('');}
    function quickViewReceipt(i){var r=quickRecentReceipts[i];if(r)quickOpenModal('Fiş Görüntüle',quickReceiptHtml(r),function(){quickToast('Fiş yazdırma hazır');});}
    function quickCustomerSelect(){quickOpenModal('Cari Seç','<div class="hs-form-grid"><div class="full"><label>Cari Ara</label><input value="Peşin Müşteri" placeholder="Cari adı / kodu"></div><div class="full"><div class="hs-held-item"><span><b>Peşin Müşteri</b><small>Varsayılan hızlı satış carisi</small></span><button class="btn btn-success btn-sm" onclick="quickToast(&quot;Cari seçildi&quot;);quickCloseModal()">Seç</button></div></div></div>',function(){});document.getElementById('quickModalOk').style.display='none';}
    var quickHotkeyOld=quickHotkey;
    quickHotkey=function(e){var tag=(e.target||{}).tagName;var inText=['INPUT','TEXTAREA','SELECT'].indexOf(tag)>-1;if(e.key==='ArrowDown'&&document.activeElement&&document.activeElement.id==='barcodeInput'){e.preventDefault();var rows=document.querySelectorAll('.hs-search-result');if(rows.length){quickSelectedSearch=(quickSelectedSearch+1)%rows.length;quickMarkSearch();}return;}if(e.key==='ArrowUp'&&document.activeElement&&document.activeElement.id==='barcodeInput'){e.preventDefault();var rows2=document.querySelectorAll('.hs-search-result');if(rows2.length){quickSelectedSearch=(quickSelectedSearch-1+rows2.length)%rows2.length;quickMarkSearch();}return;}if(e.key==='Enter'&&document.activeElement&&document.activeElement.id==='barcodeInput'){e.preventDefault();var rs=document.querySelectorAll('.hs-search-result');if(rs.length&&rs[quickSelectedSearch])quickPick(rs[quickSelectedSearch].dataset.code);else quickBarcode();return;}if(inText&&e.key!=='Escape'&&e.key!=='F5'&&e.key!=='F6')return;if(e.key==='F2'){e.preventDefault();quickNewSale();}else if(e.key==='F3'){e.preventDefault();quickCustomerSelect();}else if(e.key==='F4'){e.preventDefault();quickDiscountModal();}else if(e.key==='F5'){e.preventDefault();quickPay('nakit');}else if(e.key==='F6'){e.preventDefault();quickPay('kart');}else if(e.key==='F7'){e.preventDefault();quickHoldSlip();}else if(e.key==='F8'){e.preventDefault();quickComplete('return');}else if(e.key==='Delete'){e.preventDefault();if(quickSelectedCart>=0)quickRemove(quickSelectedCart);else{quickCart.pop();quickSaleRefresh();}}else if(e.ctrlKey&&e.key.toLowerCase()==='f'){e.preventDefault();document.getElementById('barcodeInput').focus();}else if(e.ctrlKey&&e.key.toLowerCase()==='s'){e.preventDefault();quickComplete('sale');}else if(e.key==='Escape'){e.preventDefault();quickCloseModal();quickCloseContext();}};
    document.removeEventListener('keydown',quickHotkeyOld);document.addEventListener('keydown',quickHotkey);
    setTimeout(function(){document.querySelectorAll('[onclick*="Cari seçim"]').forEach(function(el){el.setAttribute('onclick','quickCustomerSelect()');});document.querySelectorAll('[onclick*="Fiş bekletildi"]').forEach(function(el){el.setAttribute('onclick','quickHoldSlip()');});document.querySelectorAll('[onclick*="İskonto componenti"]').forEach(function(el){el.setAttribute('onclick','quickDiscountModal()');});var actions=document.querySelector('.hs-actions');if(actions&&!document.getElementById('quickHeldBtn'))actions.insertAdjacentHTML('beforeend','<button id="quickHeldBtn" class="btn btn-ghost" onclick="quickShowHeld()">Bekleyen Fişler</button>');quickSaleRefresh();},180);

  </script>
