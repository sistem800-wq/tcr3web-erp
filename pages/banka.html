<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10243f"><link rel="manifest" href="../manifest.webmanifest"><title>Tcr3WEB · Banka Yönetimi</title><link rel="stylesheet" href="../assets/css/style.css"><link rel="stylesheet" href="../assets/css/responsive-master.css?v=20260713-591"><link rel="stylesheet" href="../assets/css/tcr-table.css?v=20260713-583"><link rel="stylesheet" href="../assets/css/kpi-standard.css"><link rel="stylesheet" href="../assets/css/text-readability.css"><link rel="stylesheet" href="../assets/css/finance-flow.css">  <link rel="stylesheet" href="../assets/css/shared-shell.css?v=20260716-575" />
</head><body><div id="app" class="app"></div><script src="../assets/js/app.js"></script><script src="../assets/js/tcr-actions.js?v=20260713-600"></script><script src="../assets/js/master-init.js?v=20260713-583"></script><script src="../assets/js/tcr-table.js?v=20260713-587"></script><script>
bootPage('banka',()=>{const total=MOCK.banka.reduce((s,b)=>s+b.bakiye,0),giris=MOCK.bankaHareket.filter(x=>x.tutar>0).reduce((s,x)=>s+x.tutar,0),cikis=MOCK.bankaHareket.filter(x=>x.tutar<0).reduce((s,x)=>s+Math.abs(x.tutar),0);let running=total;return `
<div class="page-head"><div><div class="breadcrumb"><a href="dashboard.html">Genel</a><span>›</span><span>Finans</span><span>›</span><span>Banka</span></div><h1 class="page-title">Banka Yönetimi</h1><div class="page-sub">Çoklu hesap, EFT/Havale, POS, virman, masraf, komisyon ve mutabakat</div></div><div class="page-actions"><button class="btn btn-ghost" onclick="location.href='banka-ekstre.html'">${ICONS.chart} Banka Ekstresi</button><button class="btn btn-ghost" onclick="location.href='cek-karnelerim.html'">${ICONS.file_check} Çek Karnelerim</button><button class="btn btn-ghost" onclick="openModal('virmanModal')">${ICONS.wallet} Banka Virmanı</button><button class="btn btn-primary" onclick="openModal('bankaModal')">${ICONS.plus} Yeni Banka Hesabı</button></div></div>
<div class="finance-summary"><div class="tcr-action-card tcr-ac-blue"><span class="tcr-ac-icon">${ICONS.building}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Toplam Bakiye</span><span class="tcr-ac-desc">${fmtMoney(total)}</span></span><span class="tcr-ac-badge">${MOCK.banka.length}</span></div><div class="tcr-action-card tcr-ac-green"><span class="tcr-ac-icon">${ICONS.trend_up}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Dönem Girişi</span><span class="tcr-ac-desc">${fmtMoney(giris)}</span></span></div><div class="tcr-action-card tcr-ac-red"><span class="tcr-ac-icon">${ICONS.trend_down}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Dönem Çıkışı</span><span class="tcr-ac-desc">${fmtMoney(cikis)}</span></span></div><div class="tcr-action-card tcr-ac-orange"><span class="tcr-ac-icon">${ICONS.cash}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Bloke / POS</span><span class="tcr-ac-desc">184.500,00 ₺</span></span><span class="tcr-ac-badge">4</span></div><div class="tcr-action-card tcr-ac-cyan"><span class="tcr-ac-icon">${ICONS.file_check}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Eşleşmeyen Hareket</span><span class="tcr-ac-desc">28.750,00 ₺</span></span><span class="tcr-ac-badge">6</span></div></div>
<div class="finance-tabs"><button class="finance-tab active">Hesaplar</button><button class="finance-tab">Hareketler</button><button class="finance-tab">Gelen EFT</button><button class="finance-tab">Giden EFT</button><button class="finance-tab">POS / Bloke</button><button class="finance-tab">Masraf / Komisyon</button><button class="finance-tab">Mutabakat</button></div>
<div class="card mb-6"><div class="card-head"><div class="card-title">Banka Hesapları</div></div><div class="card-body" style="padding:0"><div class="table-responsive"><table class="data"><thead><tr><th>Banka</th><th>Hesap Tipi</th><th>Döviz</th><th>IBAN</th><th class="num">Bakiye</th><th class="num">Bloke</th><th class="num">Kullanılabilir</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${MOCK.banka.map((b,i)=>`<tr><td class="strong">${b.banka}</td><td><span class="pill">${b.hesap}</span></td><td>${b.tur||'TL'}</td><td class="mono">${b.iban}</td><td class="num strong">${fmtMoney(b.bakiye)}</td><td class="num money-out">${i===1?'125.000,00 ₺':'-'}</td><td class="num money-in">${fmtMoney(b.bakiye-(i===1?125000:0))}</td><td><span class="finance-status approved">Aktif</span></td><td><div class="finance-actions"><button class="icon-btn" title="Ekstre" onclick="location.href='banka-ekstre.html'">${ICONS.eye}</button><button class="icon-btn" title="Düzenle" onclick="openModal('bankaModal')">${ICONS.edit}</button></div></td></tr>`).join('')}</tbody></table></div></div></div>
<div class="card"><div class="card-head"><div class="card-title">Banka Hareketleri ve Eşleştirme</div><div class="finance-toolbar"><input class="form-input" placeholder="İşlem, cari, referans ara"><select class="filter-select"><option>Tüm Hesaplar</option>${MOCK.banka.map(b=>`<option>${b.banka} - ${b.hesap}</option>`).join('')}</select><select class="filter-select"><option>Tüm Kaynaklar</option><option>Cari Tahsilat</option><option>Cari Ödeme</option><option>POS</option><option>Çek Tahsilatı</option><option>Masraf</option><option>Virman</option></select><button class="btn btn-ghost">${ICONS.filter} Filtrele</button></div></div><div class="card-body" style="padding:0"><div class="table-responsive"><table class="data"><thead><tr><th>İşlem No</th><th>Tarih</th><th>Banka</th><th>Açıklama</th><th>Kaynak</th><th>Eşleşme</th><th class="num">Giriş</th><th class="num">Çıkış</th><th class="num">Yürüyen Bakiye</th><th>İşlem</th></tr></thead><tbody>${MOCK.bankaHareket.map((h,i)=>{running-=h.tutar;return `<tr class="${i===2?'recon-row':''}"><td class="mono strong">BNH-${String(2026001+i)}</td><td>${fmtDate(h.tarih)}</td><td>${h.banka}</td><td class="strong">${h.aciklama}</td><td>${i===1?'POS':i===2?'Banka Masrafı':h.tip==='Giriş'?'Cari Tahsilat':'Cari Ödeme'}</td><td><span class="finance-status ${i===2?'pending':'approved'}">${i===2?'Eşleşme Bekliyor':'Eşleşti'}</span></td><td class="num money-in">${h.tutar>0?fmtMoney(h.tutar):'-'}</td><td class="num money-out">${h.tutar<0?fmtMoney(Math.abs(h.tutar)):'-'}</td><td class="num running-balance">${fmtMoney(running)}</td><td><div class="finance-actions"><button class="icon-btn" title="Gör">${ICONS.eye}</button><button class="icon-btn" title="Eşleştir">${ICONS.check}</button></div></td></tr>`}).join('')}</tbody></table></div></div><div class="card-foot">Durum : ${MOCK.bankaHareket.length} hareket · 6 eşleşme bekliyor · Net ${fmtMoney(giris-cikis)}</div></div>
${modalHtml('bankaModal','Yeni Banka Hesabı',`<div class="form-grid-2"><div class="form-field"><label class="form-label">Banka Adı</label><input class="form-input" placeholder="Banka adı"></div><div class="form-field"><label class="form-label">Şube</label><input class="form-input" placeholder="Şube"></div><div class="form-field"><label class="form-label">Hesap Tipi</label><select class="form-input"><option>Vadesiz</option><option>Vadeli</option><option>POS</option><option>Kredi</option><option>Bloke</option></select></div><div class="form-field"><label class="form-label">Para Birimi</label><select class="form-input"><option>TRY</option><option>USD</option><option>EUR</option></select></div><div class="form-field full"><label class="form-label">IBAN</label><input class="form-input" placeholder="TR00 0000 0000 0000 0000 0000 00"></div><div class="form-field"><label class="form-label">Açılış Bakiyesi</label><input class="form-input" value="0,00"></div><div class="form-field"><label class="form-label">Kullanım Türü</label><select class="form-input"><option>Cari İşlemler</option><option>POS Tahsilat</option><option>Maaş</option><option>Vergi</option></select></div></div>`,`<button class="btn btn-outline-danger" onclick="closeModal('bankaModal')">Vazgeç</button><button class="btn btn-success" onclick="closeModal('bankaModal');toast('Banka hesabı kaydedildi','success')">${ICONS.check} Kaydet</button>`)}
${modalHtml('virmanModal','Bankalar Arası Virman',`<div class="finance-modal-note mb-4">Virman tek fiş numarasıyla kaynak hesaba çıkış, hedef hesaba giriş oluşturur.</div><div class="form-grid-2"><div class="form-field"><label class="form-label">Kaynak Hesap</label><select class="form-input">${MOCK.banka.map(b=>`<option>${b.banka} - ${b.hesap}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Hedef Hesap</label><select class="form-input">${MOCK.banka.map(b=>`<option>${b.banka} - ${b.hesap}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Tutar</label><input class="form-input" value="0,00"></div><div class="form-field"><label class="form-label">Durum</label><select class="form-input"><option>Taslak</option><option>Onay Bekliyor</option><option>Onaylandı</option></select></div><div class="form-field full"><label class="form-label">Açıklama</label><textarea class="form-input"></textarea></div></div>`,`<button class="btn btn-outline-danger" onclick="closeModal('virmanModal')">Vazgeç</button><button class="btn btn-success" onclick="closeModal('virmanModal');toast('Banka virmanı kaydedildi','success')">${ICONS.check} Kaydet</button>`)}
`});</script></body></html>
