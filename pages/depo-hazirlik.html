<!DOCTYPE html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="#10243f"><link rel="manifest" href="../manifest.webmanifest?v=20260711-699"><link rel="icon" href="../assets/icons/favicon-64.png"><title>Tcr3WEB · Hazırlanacak Siparişler</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../assets/css/style.css?v=20260712-653"><link rel="stylesheet" href="../assets/css/responsive-master.css?v=20260713-591"><link rel="stylesheet" href="../assets/css/performance.css?v=20260711-700"><link rel="stylesheet" href="../assets/css/depo-operasyon.css?v=728"><link rel="stylesheet" href="../assets/css/tcr-table.css?v=20260713-583">  <link rel="stylesheet" href="../assets/css/text-readability.css?v=20260712-657" />
  <link rel="stylesheet" href="../assets/css/shared-shell.css?v=20260716-574" />
  <link rel="stylesheet" href="../assets/css/master-ui-standard.css?v=20260717-546" />
</head><body><div id="app" class="app"></div><script src="../assets/js/app.js?v=20260716-574"></script><script src="../assets/js/tcr-actions.js?v=20260713-600"></script>
  <script src="../assets/js/master-init.js?v=20260713-583"></script>
  <script src="../assets/js/tcr-table.js?v=20260713-587"></script><script src="../assets/js/depo-operasyon.js?v=728"></script><script>
bootPage('depo-hazirlik',()=>{const wh=DOP.warehouse, rows=DOP.orders.filter(o=>o.warehouse===wh).map(o=>{const pr=dopOrderProgress(o);return `<tr><td class="mono strong">${o.id}</td><td><b>${o.customer}</b><div class="muted" style="font-size:11px">${o.items.length} ürün kalemi</div></td><td>${o.deadline}</td><td><span class="dop-chip ${dopStatusClass(o.status)}">${o.status}</span></td><td>${pr.p}/${pr.q}<div class="dop-progress"><span style="width:${pr.pct}%"></span></div></td><td><div class="dop-actions"><button class="dop-icon-btn indigo" title="Sipariş kalemlerini görüntüle" onclick="showDetail('${o.id}')">${ICONS.eye}</button><button class="dop-icon-btn green" title="Tüm kalemleri hazırlandı olarak işaretle" onclick="dopPrepare('${o.id}')">${ICONS.check}</button><button class="dop-icon-btn red" title="Eksik ürün bildir" onclick="dopMissing('${o.id}')">${ICONS.alert}</button></div></td></tr>`}).join('');return `<div class="page-head"><div><div class="breadcrumb"><a href="depo-operasyon.html">Depo Operasyonları</a><span>›</span><span>Hazırlanacak Siparişler</span></div><h1 class="page-title">${ICONS.inbox} Hazırlanacak Siparişler</h1><div class="page-sub">Yalnızca ${wh} için atanmış ürünler gösterilir.</div></div><div class="dop-warehouse-select"><select onchange="dopSetWarehouse(this.value)"><option ${wh==='Merkez Depo'?'selected':''}>Merkez Depo</option><option ${wh==='Araç Deposu'?'selected':''}>Araç Deposu</option><option ${wh==='Kimya Depo'?'selected':''}>Kimya Depo</option></select></div></div><section class="dop-panel" style="--accent:#4f46e5"><div class="dop-panel-head"><div><div class="dop-panel-title">Sipariş Hazırlık Kuyruğu</div><div class="dop-panel-sub">Fiyat ve iskonto bilgileri bu rolde gösterilmez.</div></div></div><div class="dop-panel-body"><div class="dop-table-wrap"><table class="dop-table data"><thead><tr><th>Sipariş No</th><th>Cari</th><th>Termin</th><th>Durum</th><th>Hazırlanan</th><th>İşlem</th></tr></thead><tbody>${rows||'<tr><td colspan="6" class="dop-empty">Kayıt bulunamadı.</td></tr>'}</tbody></table></div><div class="dop-mobile-card">${DOP.orders.filter(o=>o.warehouse===wh).map(o=>`<div class="dop-mobile-item"><b>${o.id} · ${o.customer}</b><div class="dop-mobile-row"><span>Termin</span><b>${o.deadline}</b></div><div class="dop-mobile-row"><span>Durum</span><span class="dop-chip ${dopStatusClass(o.status)}">${o.status}</span></div><div class="dop-actions" style="margin-top:10px"><button class="dop-icon-btn indigo" onclick="showDetail('${o.id}')">${ICONS.eye}</button><button class="dop-icon-btn green" onclick="dopPrepare('${o.id}')">${ICONS.check}</button><button class="dop-icon-btn red" onclick="dopMissing('${o.id}')">${ICONS.alert}</button></div></div>`).join('')}</div></div></section><div id="detailModal"></div>`});
function showDetail(id){const o=DOP.orders.find(x=>x.id===id);if(!o)return;document.getElementById('detailModal').innerHTML=modalHtml('dopDetail','Sipariş Hazırlık · '+o.id,`<div class="dop-lock-note" style="margin-bottom:12px">${ICONS.lock||ICONS.alert} Depo personeli fiyat, iskonto ve cari bakiye göremez.</div><table class="dop-table data"><thead><tr><th>Ürün</th><th>Raf</th><th>Barkod</th><th>İstenen</th><th>Hazırlanan</th></tr></thead><tbody>${o.items.map(i=>`<tr><td><b>${i.name}</b></td><td>${i.shelf}</td><td class="mono">${i.barcode}</td><td>${i.qty} ${i.unit}</td><td><input class="form-input" style="width:95px" type="number" min="0" max="${i.qty}" value="${i.prepared}" onchange="i.prepared=Math.min(${i.qty},Math.max(0,Number(this.value)));dopSave(DOP)"></td></tr>`).join('')}</tbody></table>`,`<button class="btn btn-ghost" onclick="closeModal('dopDetail')">Kapat</button><button class="btn btn-success" onclick="dopPrepare('${o.id}')">${ICONS.check} Hazırlandı</button>`,'xl');openModal('dopDetail')}
</script></body></html>
