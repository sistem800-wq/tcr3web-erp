      <div class="card" id="hdInvoiceCard" style="display:none"><div class="card-body"><div class="text-soft mb-2">Fatura Ürün Detayları</div><div class="table-wrap hareket-detail-table-wrap"><table class="data hareket-urun-table" id="hdInvoiceTable" data-no-record-lock="true" data-tcr-sort="off" data-tcr-pagination="off" data-tcr-search="off"><colgroup><col class="col-code"><col class="col-name"><col class="col-qty"><col class="col-unit"><col class="col-discount"><col class="col-total"></colgroup><thead><tr><th class="col-code">Ürün Kodu</th><th class="col-name">Ürün/Hizmet</th><th class="num col-qty">Miktar</th><th class="col-unit">Birim</th><th class="num col-discount">İskonto</th><th class="num col-total">Tutar</th></tr></thead><tbody id="hdInvoiceBody"></tbody></table></div><div class="ekstre-summary" style="justify-content:flex-end"><span>Ara Toplam: <strong id="hdAraToplam">0,00 ₺</strong></span><span>KDV Toplam: <strong id="hdKdvToplam">0,00 ₺</strong></span><span>Genel Toplam: <strong id="hdGenelToplam">0,00 ₺</strong></span></div></div></div>
      <div class="card" id="hdPaymentCard" style="display:none"><div class="card-body"><div class="text-soft mb-2">Tahsilat / Ödeme Bilgileri</div><div class="grid-2"><div class="stat-row"><span class="stat-label">Ödeme Yöntemi</span><span class="stat-value" id="hdOdemeYontemi">-</span></div><div class="stat-row"><span class="stat-label">Hesap</span><span class="stat-value" id="hdOdemeHesap">-</span></div><div class="stat-row"><span class="stat-label">Referans No</span><span class="stat-value mono" id="hdOdemeRef">-</span></div><div class="stat-row"><span class="stat-label">İşlem Durumu</span><span class="stat-value"><span class="badge badge-success">Onaylı</span></span></div></div></div></div>
    </section>
  </div>`, `<button class="btn btn-ghost" onclick="window.print()">${ICONS.print} Yazdır</button><button class="btn btn-danger" data-action="close" onclick="closeModal('hareketDetayModal')">${ICONS.close} Kapat</button>`, 'xl')}`);

function onEkstreEntitySelected(id,ad){const el=document.getElementById('entitySelect');if(el&&ad)el.value=ad;toast((ad||'Kayıt')+' seçildi','success');applyEkstreFilter();}
function money(v){return Number(v||0).toLocaleString('tr-TR',{minimumFractionDigits:2,maximumFractionDigits:2})+' ₺'}
function qty(v){return Number(v||0).toLocaleString('tr-TR')}
function rowHtml(r){const stock='cari-ekstre'==='stok-ekstre';return `<tr class="hareket-row" title="Hareket detayını aç"><td>${fmtDate(r[0])}</td><td class="mono strong">${r[1]}</td><td><span class="badge badge-info">${r[2]}</span></td><td>${r[3]}</td><td class="num ekstre-positive">${r[4]? (stock?qty(r[4]):money(r[4])):'-'}</td><td class="num ekstre-negative">${r[5]? (stock?qty(r[5]):money(r[5])):'-'}</td><td class="num strong ${Number(r[6]||0)>0?'is-borc':Number(r[6]||0)<0?'is-alacak':''}">${stock?qty(r[6]):money(r[6])}</td><td class="ekstre-action-cell"><button type="button" class="icon-btn ekstre-view-btn" title="Hareket detayını görüntüle" aria-label="Hareket detayını görüntüle" onclick="event.stopPropagation();openEkstreHareket('${r[1]}')">${ICONS.eye}</button></td></tr>`}
function applyEkstreFilter(){const f=document.getElementById('dateFrom').value,t=document.getElementById('dateTo').value;const rows=EKSTRE_ROWS.filter(r=>(!f||r[0]>=f)&&(!t||r[0]<=t));document.getElementById('ekstreBody').innerHTML=rows.length?rows.map(rowHtml).join(''):'<tr><td colspan="8" class="ekstre-empty">Seçilen tarih aralığında kayıt bulunamadı.</td></tr>';const si=rows.reduce((s,r)=>s+Number(r[4]||0),0),so=rows.reduce((s,r)=>s+Number(r[5]||0),0),bal=rows.length?rows[0][6]:0,stock='cari-ekstre'==='stok-ekstre';document.getElementById('sumIn').textContent=stock?qty(si):money(si);document.getElementById('sumOut').textContent=stock?qty(so):money(so);document.getElementById('sumBalance').textContent=stock?qty(bal):money(bal);document.getElementById('rangeInfo').textContent=(f?fmtDate(f):'İlk kayıt')+' - '+(t?fmtDate(t):'Bugün');}
function setPeriod(p,el){document.querySelectorAll('.ekstre-period-card').forEach(x=>x.classList.remove('is-active'));el.classList.add('is-active');const end='2026-07-12',d=new Date(end+'T12:00:00');if(p==='daily'){}else if(p==='weekly')d.setDate(d.getDate()-6);else if(p==='monthly')d.setMonth(d.getMonth()-1);else d.setFullYear(d.getFullYear()-1);document.getElementById('dateFrom').value=d.toISOString().slice(0,10);document.getElementById('dateTo').value=end;applyEkstreFilter();}
function updateKpis(){const end=new Date('2026-07-12T12:00:00');[['Daily',0],['Weekly',6],['Monthly',30],['Yearly',365]].forEach(([id,days])=>{const start=new Date(end);start.setDate(start.getDate()-days);const total=EKSTRE_ROWS.filter(r=>new Date(r[0]+'T12:00:00')>=start).reduce((s,r)=>s+Number(r[4]||0)-Number(r[5]||0),0);document.getElementById('kpi'+id).textContent='cari-ekstre'==='stok-ekstre'?qty(total):money(total);})}

function openEkstreHareket(fisNo){
  const r=EKSTRE_ROWS.find(x=>x[1]===fisNo); if(!r) return;
  document.getElementById('hdBelgeNo').textContent=r[1];
  document.getElementById('hdTur').textContent=r[2];
  document.getElementById('hdTarih').textContent=fmtDate(r[0]);
  document.getElementById('hdCari').textContent=SELECTED_CARI_AD;
  document.getElementById('hdBorc').textContent=r[4]?money(r[4]):'-';
  document.getElementById('hdAlacak').textContent=r[5]?money(r[5]):'-';
  document.getElementById('hdBakiye').textContent=money(r[6]);
  document.getElementById('hdAciklama').textContent=r[3];

  const invoiceCard=document.getElementById('hdInvoiceCard');
  const paymentCard=document.getElementById('hdPaymentCard');
  invoiceCard.style.display='none'; paymentCard.style.display='none';

  const kalemler=HAREKET_KALEMLERI[fisNo]||[];
  if(/Fatura/i.test(r[2]) && kalemler.length){
    invoiceCard.style.display='block';
    document.getElementById('hdInvoiceBody').innerHTML=kalemler.map(k=>`<tr><td class="mono strong col-code">${k.kod}</td><td class="col-name">${k.ad}</td><td class="num col-qty">${qty(k.miktar)}</td><td class="col-unit">${k.birim}</td><td class="num col-discount">${money(k.iskonto)}</td><td class="num strong col-total">${money(k.tutar)}</td></tr>`).join('');
    const genel=kalemler.reduce((s,k)=>s+Number(k.tutar||0),0);
    const ara=genel/1.20, kdv=genel-ara;
    document.getElementById('hdAraToplam').textContent=money(ara);
    document.getElementById('hdKdvToplam').textContent=money(kdv);
    document.getElementById('hdGenelToplam').textContent=money(genel);
  } else if(/Tahsilat|Ödeme/i.test(r[2])){
    paymentCard.style.display='block';
    document.getElementById('hdOdemeYontemi').textContent=/Banka/i.test(r[3])?'Banka Havalesi':'Nakit';
    document.getElementById('hdOdemeHesap').textContent=/Banka/i.test(r[3])?'İş Bankası TL Hesabı':'Merkez Kasa';
    document.getElementById('hdOdemeRef').textContent='REF-'+r[1].slice(-6);
  }
  openModal('hareketDetayModal');
}
function ekstreOutput(type){const labels={whatsapp:'WhatsApp paylaşımı hazırlandı',email:'E-posta gönderimi hazırlandı',pdf:'PDF dosyası hazırlandı'};toast(labels[type]||'İşlem tamamlandı','success')}
setTimeout(()=>{updateKpis();applyEkstreFilter();},80);
</script></body></html>
