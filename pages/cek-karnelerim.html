<!DOCTYPE html>
<html lang="tr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Tcr3WEB · Çek Karnelerim</title>
<link rel="stylesheet" href="../assets/css/style.css?v=20260712-636"/><link rel="stylesheet" href="../assets/css/responsive-master.css?v=20260713-591"/><link rel="stylesheet" href="../assets/css/tcr-table.css?v=20260713-583"/><link rel="stylesheet" href="../assets/css/kpi-standard.css"/><link rel="stylesheet" href="../assets/css/text-readability.css"/></head>
<body><div id="app" class="app"></div><script src="../assets/js/app.js?v=20260712-636"></script><script src="../assets/js/tcr-actions.js?v=20260713-600"></script><script src="../assets/js/master-init.js?v=20260713-583"></script><script src="../assets/js/tcr-table.js?v=20260713-587"></script>
<script>
const CHECKBOOK_KEY='tcr3_checkbooks';
function seedCheckbooks(){let rows=[];try{rows=JSON.parse(localStorage.getItem(CHECKBOOK_KEY)||'[]')}catch(e){}if(!rows.length){rows=[{id:'CKB-001',bank:'İş Bankası',branch:'Osmaniye',account:'CARİ',iban:'TR34 0006 4000 0006 4000 0006 40',bookNo:'ISB-2026-A',start:100001,end:100025,last:100004,status:'Aktif'},{id:'CKB-002',bank:'Ziraat Bankası',branch:'Bahçe',account:'Vadesiz TL',iban:'TR20 0001 0000 0002 3456 7890 12',bookNo:'ZRT-2026-B',start:200001,end:200050,last:200010,status:'Aktif'}];localStorage.setItem(CHECKBOOK_KEY,JSON.stringify(rows))}return rows}
function saveCheckbooks(rows){localStorage.setItem(CHECKBOOK_KEY,JSON.stringify(rows))}
function renderCheckbooks(){const rows=seedCheckbooks();const active=rows.filter(x=>x.status==='Aktif').length, used=rows.reduce((s,x)=>s+Math.max(0,(+x.last||(+x.start-1))-+x.start+1),0), total=rows.reduce((s,x)=>s+(+x.end-+x.start+1),0);return `<div class="page-head"><div><div class="breadcrumb"><a href="dashboard.html">Genel</a><span>›</span><a href="banka.html">Banka</a><span>›</span><span>Çek Karnelerim</span></div><h1 class="page-title">Çek Karnelerim</h1><div class="page-sub">Firma banka hesaplarına bağlı çek karnesi ve yaprak takibi</div></div><div class="page-actions"><button class="btn btn-primary" onclick="openCheckbookModal()">${ICONS.plus} Yeni Çek Karnesi</button></div></div>
<div class="tcr-ac-grid"><div class="tcr-action-card tcr-ac-blue"><span class="tcr-ac-icon">${ICONS.file_check}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Toplam Karne</span><span class="tcr-ac-desc">${rows.length} karne</span></span></div><div class="tcr-action-card tcr-ac-green"><span class="tcr-ac-icon">${ICONS.check}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Aktif</span><span class="tcr-ac-desc">${active} karne</span></span></div><div class="tcr-action-card tcr-ac-orange"><span class="tcr-ac-icon">${ICONS.file_text}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Kullanılan</span><span class="tcr-ac-desc">${used} yaprak</span></span></div><div class="tcr-action-card tcr-ac-purple"><span class="tcr-ac-icon">${ICONS.inbox}</span><span class="tcr-ac-content"><span class="tcr-ac-title">Kalan</span><span class="tcr-ac-desc">${Math.max(0,total-used)} yaprak</span></span></div></div>
<div class="card"><div class="card-body" style="padding:0"><table class="data"><thead><tr><th>Karne No</th><th>Banka</th><th>Şube</th><th>Hesap / IBAN</th><th>Seri Aralığı</th><th>Son Kullanılan</th><th>Kalan</th><th>Durum</th><th>İşlem</th></tr></thead><tbody>${rows.map(x=>`<tr><td class="strong">${x.bookNo}</td><td>${x.bank}</td><td>${x.branch}</td><td><strong>${x.account}</strong><br><small>${x.iban}</small></td><td>${x.start} - ${x.end}</td><td>${x.last||'-'}</td><td class="strong">${Math.max(0,+x.end-(+x.last||(+x.start-1)))}</td><td><span class="badge ${x.status==='Aktif'?'badge-success':'badge-danger'}">${x.status}</span></td><td><button class="icon-btn" title="Düzenle" onclick="openCheckbookModal('${x.id}')">${ICONS.edit}</button></td></tr>`).join('')}</tbody></table></div></div>
${modalHtml('checkbookModal','Çek Karnesi',`<div class="form-grid-2"><input type="hidden" id="cb-id"><div class="form-field"><label class="form-label">Banka Hesabı</label><select class="form-input" id="cb-bank" onchange="fillBankAccount()"><option value="">Banka seçiniz</option>${MOCK.banka.map((b,i)=>`<option value="${i}">${b.banka} · ${b.hesap}</option>`).join('')}</select></div><div class="form-field"><label class="form-label">Şube</label><input class="form-input" id="cb-branch"></div><div class="form-field full"><label class="form-label">IBAN</label><input class="form-input" id="cb-iban" readonly></div><div class="form-field"><label class="form-label">Karne No</label><input class="form-input" id="cb-bookno"></div><div class="form-field"><label class="form-label">Durum</label><select class="form-input" id="cb-status"><option>Aktif</option><option>Pasif</option></select></div><div class="form-field"><label class="form-label">Seri Başlangıç</label><input class="form-input" type="number" id="cb-start"></div><div class="form-field"><label class="form-label">Seri Bitiş</label><input class="form-input" type="number" id="cb-end"></div><div class="form-field"><label class="form-label">Son Kullanılan Yaprak</label><input class="form-input" type="number" id="cb-last"></div></div>`,`<button class="btn btn-ghost" onclick="closeModal('checkbookModal')">İptal</button><button class="btn btn-primary" onclick="saveCheckbook()">${ICONS.check} Kaydet</button>`)} `}
bootPage('cek-karnelerim',renderCheckbooks);
function fillBankAccount(){const b=MOCK.banka[+document.getElementById('cb-bank').value];if(!b)return;document.getElementById('cb-iban').value=b.iban||'';document.getElementById('cb-branch').value=b.sube||b.branch||''}
function openCheckbookModal(id){const rows=seedCheckbooks(),x=rows.find(r=>r.id===id);['cb-id','cb-bookno','cb-start','cb-end','cb-last','cb-branch','cb-iban'].forEach(i=>document.getElementById(i).value='');document.getElementById('cb-bank').value='';document.getElementById('cb-status').value='Aktif';if(x){document.getElementById('cb-id').value=x.id;document.getElementById('cb-bookno').value=x.bookNo;document.getElementById('cb-start').value=x.start;document.getElementById('cb-end').value=x.end;document.getElementById('cb-last').value=x.last;document.getElementById('cb-branch').value=x.branch;document.getElementById('cb-iban').value=x.iban;document.getElementById('cb-status').value=x.status;const i=MOCK.banka.findIndex(b=>b.banka===x.bank&&b.iban===x.iban);if(i>=0)document.getElementById('cb-bank').value=i}openModal('checkbookModal')}
function saveCheckbook(){const idx=+document.getElementById('cb-bank').value,b=MOCK.banka[idx];if(!b)return toast('Banka hesabı seçmelisiniz','warning');const start=+document.getElementById('cb-start').value,end=+document.getElementById('cb-end').value;if(!start||!end||end<start)return toast('Seri aralığını kontrol edin','warning');let rows=seedCheckbooks(),id=document.getElementById('cb-id').value||('CKB-'+Date.now());const item={id,bank:b.banka,branch:document.getElementById('cb-branch').value,account:b.hesap,iban:b.iban,bookNo:document.getElementById('cb-bookno').value,start,end,last:+document.getElementById('cb-last').value||start-1,status:document.getElementById('cb-status').value};const pos=rows.findIndex(x=>x.id===id);if(pos>=0)rows[pos]=item;else rows.push(item);saveCheckbooks(rows);closeModal('checkbookModal');toast('Çek karnesi kaydedildi','success');setTimeout(()=>location.reload(),250)}
</script></body></html>
